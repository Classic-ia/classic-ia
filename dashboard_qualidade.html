<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#080808">
<title>Dashboard Qualidade · Classic CQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cq_layout.css">
</head>
<body>

<!-- ═══ SHELL ═══ -->
<header class="cq-header">
  <img id="logoImg" class="cq-header-logo" src="assets/logo-classic-icon.png.jpg" alt="">
  <div>
    <div class="cq-header-title">Qualidade</div>
    <div class="cq-header-sub">Onde agir agora</div>
  </div>
  <div class="cq-header-right">
    <div class="cq-header-user desktop-only" id="userInfo"></div>
    <div class="cq-header-avatar" id="userAvatar"></div>
    <button class="btn btn-ghost btn-sm desktop-only" onclick="CQAuth.logout()">Sair</button>
  </div>
</header>

<nav class="cq-sidebar" id="sidebar"></nav>
<nav class="cq-bottomnav" id="bottomnav"></nav>

<main class="cq-main">
  <!-- Loading -->
  <div id="loadingState" class="loading-state"><span class="spin">&#9203;</span> Carregando dados...</div>

  <div id="dashContent" class="hidden">

    <!-- Filtro -->
    <div class="filter-bar">
      <span class="input-label">Periodo</span>
      <select id="filtroPeriodo" class="input" style="width:auto;min-width:110px" onchange="carregarTudo()">
        <option value="30">30 dias</option>
        <option value="7">7 dias</option>
        <option value="1">Hoje</option>
        <option value="90">90 dias</option>
      </select>
      <button class="btn btn-ghost btn-sm" onclick="carregarTudo()">Atualizar</button>
      <span id="lastUpdate" class="t-mono t-muted" style="margin-left:auto;font-size:10px"></span>
    </div>

    <!-- BLOCO 1: ALERTAS -->
    <div id="blocoAlertas"></div>
    <!-- BLOCO 2: FORNECEDORES -->
    <div id="blocoFornecedores"></div>
    <!-- BLOCO 3: PRODUTOS -->
    <div id="blocoProdutos"></div>
    <!-- BLOCO 4: LOTES -->
    <div id="blocoLotes"></div>
    <!-- BLOCO 5: SETORES -->
    <div id="blocoSetores"></div>
    <!-- BLOCO 6: DEFEITOS -->
    <div id="blocoDefeitos"></div>
    <!-- BLOCO 7: PIPELINE -->
    <div id="blocoPipeline"></div>

  </div>
</main>

<script src="config.js"></script>
<script src="cq_api.js"></script>
<script src="cq_auth.js"></script>
<script src="cq_ui.js"></script>
<script>
// ══════════════════════════════════════════════════════════════
// DASHBOARD DECISIONAL — Híbrido Mobile + Desktop
// ══════════════════════════════════════════════════════════════

(async function(){
  const usuario = await CQAuth.init({
    perfisPermitidos: ['administrador','qualidade','diretoria','financeiro','gestor'],
    redirectLogin: true
  });
  if (!usuario) return;

  CQ.shell({ activePage: 'dashboard', usuario });
  await carregarTudo();
})();

async function api(ep) { return CQ_API.get(ep); }

async function carregarTudo() {
  document.getElementById('loadingState').classList.remove('hidden');
  document.getElementById('dashContent').classList.add('hidden');

  try {
    const [alertas, fornecedores, produtos, lotes, setores, defRanking, defForn, pipeline] = await Promise.all([
      api('vw_dash_alertas?select=*&limit=20'),
      api('vw_qualidade_fornecedor?select=*&limit=30'),
      api('vw_qualidade_produto?select=*&limit=20'),
      api('vw_qualidade_lote?select=*&limit=50'),
      api('vw_qualidade_setor?select=*'),
      api('vw_dash_defeitos_ranking?select=*&limit=15'),
      api('vw_dash_defeitos_fornecedor?select=*&limit=30'),
      api('vw_dash_pipeline?select=*&order=ordem'),
    ]);

    renderAlertas(alertas);
    renderFornecedores(fornecedores);
    renderProdutos(produtos);
    renderLotes(lotes);
    renderSetores(setores);
    renderDefeitos(defRanking, defForn);
    renderPipeline(pipeline);

    document.getElementById('lastUpdate').textContent =
      'Atualizado ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    console.error('Erro dashboard:', e);
  }

  document.getElementById('loadingState').classList.add('hidden');
  document.getElementById('dashContent').classList.remove('hidden');
}


// ══════════════════════════════════════════════════════════════
// BLOCO 1: ALERTAS
// ══════════════════════════════════════════════════════════════
function renderAlertas(alertas) {
  const el = document.getElementById('blocoAlertas');
  if (!alertas || !alertas.length) {
    el.innerHTML = `
      <div class="section-head">
        <div class="section-dot" style="background:var(--good)"></div>
        <div class="section-title" style="color:var(--good)">Sem alertas criticos</div>
      </div>
      <div class="empty-state">Nenhum item exige acao imediata.</div>`;
    return;
  }

  const tipoLabel = {
    fornecedor_piorando:'Fornecedor', produto_critico:'Produto',
    defeito_acima_limite:'Defeito', defeito_recorrente:'Recorrente',
    degradacao_fornecedor:'Degradacao', inconsistencia_dados:'Dados',
  };

  el.innerHTML = `
    <div class="section-head">
      <div class="section-dot" style="background:var(--danger)"></div>
      <div class="section-title" style="color:var(--danger)">Alertas Imediatos</div>
      <div class="section-count">${alertas.length} item${alertas.length>1?'s':''}</div>
    </div>
    <div class="flex flex-col gap-sm">
      ${alertas.map(a => `
        <div class="alert-card ${a.gravidade==='atencao'?'warn':''}">
          <div class="alert-body">
            <div class="alert-title">${CQ.esc(a.nome||a.codigo||'—')}</div>
            <div class="alert-desc">${CQ.esc(a.descricao||'')}</div>
          </div>
          <div class="alert-tag">${tipoLabel[a.tipo_alerta]||a.tipo_alerta}</div>
        </div>`).join('')}
    </div>`;
}


// ══════════════════════════════════════════════════════════════
// BLOCO 2: FORNECEDORES (table desktop + cards mobile)
// ══════════════════════════════════════════════════════════════
function renderFornecedores(dados) {
  const el = document.getElementById('blocoFornecedores');
  el.innerHTML = `
    <div class="section-head">
      <div class="section-dot" style="background:var(--warn)"></div>
      <div class="section-title" style="color:var(--warn)">Qualidade por Fornecedor</div>
      ${dados?.length ? `<div class="section-count">${dados.length}</div>` : ''}
    </div>` +
    CQ.table(dados, [
      { key:'fornecedor_nome', label:'Fornecedor', format:(v,d) => `<span style="font-weight:700">${CQ.esc(v||d.fornecedor_codigo||'—')}</span>${d.status_fornecedor==='bloqueado'?' <span class="badge badge-crit">BLOQ</span>':d.status_fornecedor==='critico'?' <span class="badge badge-crit">CRIT</span>':''}`, mobileLabel:'Fornecedor' },
      { key:'fornecedor_uf', label:'UF', align:'center', mono:true, mobile:false },
      { key:'total_lotes', label:'Lotes', align:'right', mono:true, format:v=>CQ.fmtNum(v), mobileLabel:'Lotes' },
      { key:'total_pecas', label:'Pecas', align:'right', mono:true, format:v=>CQ.fmtNum(v), mobile:false },
      { key:'score', label:'Score', align:'right', bold:true, color:(v)=>CQ.scoreColor(v), format:v=>v!=null?v:'—', mobileLabel:'Score' },
      { key:'pct_a', label:'%A', align:'right', mono:true, color:'var(--ok)', format:v=>CQ.fmtPct(v), mobile:false },
      { key:'pct_b', label:'%B', align:'right', mono:true, color:'var(--warn)', format:v=>CQ.fmtPct(v), mobile:false },
      { key:'pct_c', label:'%C', align:'right', mono:true, color:'var(--danger)', format:v=>CQ.fmtPct(v), mobileLabel:'%C' },
      { key:'pct_defeitos', label:'%Def', align:'right', mono:true, format:v=>CQ.fmtPct(v), mobile:false },
      { key:'variacao_30d', label:'30d', align:'center', format:(v)=>{const n=v||0;return CQ.tendIcon(n>3?'melhorando':n<-3?'piorando':'estavel');}, mobileLabel:'Trend' },
    ], {
      critFn: d => (d.score!=null&&d.score<50)||d.status_fornecedor==='bloqueado'||d.status_fornecedor==='critico',
      emptyMsg: 'Sem dados de fornecedores no periodo.',
    });
}


// ══════════════════════════════════════════════════════════════
// BLOCO 3: PRODUTOS
// ══════════════════════════════════════════════════════════════
function renderProdutos(dados) {
  const el = document.getElementById('blocoProdutos');
  el.innerHTML = `
    <div class="section-head">
      <div class="section-dot" style="background:#F0E442"></div>
      <div class="section-title" style="color:#F0E442">Qualidade por Produto</div>
      ${dados?.length ? `<div class="section-count">${dados.length}</div>` : ''}
    </div>` +
    CQ.table(dados, [
      { key:'produto_nome', label:'Produto', format:(v,d)=>`<span style="font-weight:700">${CQ.esc(v||d.produto_codigo||'—')}</span>` },
      { key:'produto_grupo', label:'Grupo', mono:true, mobile:false },
      { key:'total_lotes', label:'Lotes', align:'right', mono:true, format:v=>CQ.fmtNum(v), mobileLabel:'Lotes' },
      { key:'score', label:'Score', align:'right', bold:true, color:v=>CQ.scoreColor(v), format:v=>v!=null?v:'—', mobileLabel:'Score' },
      { key:'pct_c', label:'%C', align:'right', mono:true, color:(v)=>v>10?'var(--danger)':'var(--text)', format:v=>CQ.fmtPct(v), mobileLabel:'%C' },
      { key:'pct_defeitos', label:'%Def', align:'right', mono:true, format:v=>CQ.fmtPct(v), mobile:false },
      { key:'principal_defeito', label:'Defeito', format:v=>CQ.esc(v||'—'), mobileLabel:'Defeito' },
      { key:'variacao_30d', label:'30d', align:'center', format:v=>{const n=v||0;return CQ.tendIcon(n>3?'melhorando':n<-3?'piorando':'estavel');}, mobile:false },
    ], {
      critFn: d => d.pct_c!=null&&d.pct_c>10,
      emptyMsg: 'Sem dados de produtos no periodo.',
    });
}


// ══════════════════════════════════════════════════════════════
// BLOCO 4: LOTES
// ══════════════════════════════════════════════════════════════
function renderLotes(dados) {
  const el = document.getElementById('blocoLotes');
  el.innerHTML = `
    <div class="section-head">
      <div class="section-dot" style="background:var(--info)"></div>
      <div class="section-title" style="color:var(--info)">Qualidade por Lote</div>
      ${dados?.length ? `<div class="section-count">${dados.length}</div>` : ''}
    </div>` +
    CQ.table(dados, [
      { key:'id_lote', label:'Lote', mono:true, color:'var(--accent)', format:v=>CQ.esc(v||'—') },
      { key:'data_inspecao', label:'Data', mono:true, format:v=>CQ.fmtDate(v), mobileLabel:'Data' },
      { key:'fornecedor_nome', label:'Fornecedor', format:v=>`<span style="font-weight:600">${CQ.esc(v||'—')}</span>`, mobileLabel:'Fornec.' },
      { key:'total_pecas', label:'Pecas', align:'right', mono:true, format:v=>CQ.fmtNum(v), mobile:false },
      { key:'score', label:'Score', align:'right', bold:true, color:v=>CQ.scoreColor(v), format:v=>v!=null?v:'—', mobileLabel:'Score' },
      { key:'classificacao_lote', label:'Class.', align:'center', bold:true, format:v=>CQ.classBadge(v), mobileLabel:'Class.' },
      { key:'pct_a', label:'%A', align:'right', mono:true, color:'var(--ok)', format:v=>CQ.fmtPct(v), mobile:false },
      { key:'pct_c', label:'%C', align:'right', mono:true, color:'var(--danger)', format:v=>CQ.fmtPct(v), mobile:false },
      { key:'inspetor_nome', label:'Inspetor', format:v=>CQ.esc(v||'—'), mobile:false },
    ], {
      critFn: d => d.classificacao_lote==='C'||(d.score!=null&&d.score<50),
      emptyMsg: 'Sem lotes inspecionados no periodo.',
    });
}


// ══════════════════════════════════════════════════════════════
// BLOCO 5: SETORES
// ══════════════════════════════════════════════════════════════
function renderSetores(dados) {
  const el = document.getElementById('blocoSetores');
  el.innerHTML = `
    <div class="section-head">
      <div class="section-dot" style="background:var(--good)"></div>
      <div class="section-title" style="color:var(--good)">Qualidade por Setor</div>
      ${dados?.length ? `<div class="section-count">${dados.length}</div>` : ''}
    </div>` +
    CQ.table(dados, [
      { key:'setor', label:'Setor', format:v=>`<span style="font-weight:700">${CQ.esc(v||'—')}</span>` },
      { key:'total_produzido', label:'Produzido', align:'right', mono:true, format:v=>CQ.fmtNum(v), mobileLabel:'Produz.' },
      { key:'total_aprovado', label:'Aprovado', align:'right', mono:true, color:'var(--good)', format:v=>CQ.fmtNum(v), mobile:false },
      { key:'total_rejeitado', label:'Rejeitado', align:'right', mono:true, color:'var(--danger)', format:v=>CQ.fmtNum(v), mobile:false },
      { key:'pct_aprovacao', label:'%Aprov.', align:'right', mono:true, color:'var(--good)', format:v=>CQ.fmtPct(v), mobileLabel:'%Aprov.' },
      { key:'pct_rejeicao', label:'%Rejeic.', align:'right', mono:true, color:(v)=>v>10?'var(--danger)':'var(--text)', format:v=>CQ.fmtPct(v), mobileLabel:'%Rej.' },
      { key:'score', label:'Score', align:'right', bold:true, color:v=>CQ.scoreColor(v), format:v=>v!=null?v:'—', mobileLabel:'Score' },
      { key:'tendencia', label:'30d', align:'center', format:v=>CQ.tendIcon(v||'estavel'), mobile:false },
    ], {
      critFn: d => d.pct_rejeicao>10||(d.score!=null&&d.score<80),
      emptyMsg: 'Sem dados de producao por setor no periodo.',
    });
}


// ══════════════════════════════════════════════════════════════
// BLOCO 6: DEFEITOS
// ══════════════════════════════════════════════════════════════
function renderDefeitos(ranking, porFornecedor) {
  const el = document.getElementById('blocoDefeitos');
  if ((!ranking||!ranking.length) && (!porFornecedor||!porFornecedor.length)) {
    el.innerHTML = `
      <div class="section-head">
        <div class="section-dot" style="background:var(--ok)"></div>
        <div class="section-title" style="color:var(--ok)">Analise de Defeitos</div>
      </div>
      <div class="empty-state">Sem dados de defeitos no periodo.</div>`;
    return;
  }

  const maxPct = ranking.length ? Math.max(...ranking.map(d=>d.pct_sobre_total||0), 1) : 1;
  const barColor = pct => pct>5?'var(--danger)':pct>2?'var(--warn)':'var(--ok)';
  const top10 = (porFornecedor||[]).slice(0,10);

  // Mobile: stacked, Desktop: side by side
  el.innerHTML = `
    <div class="section-head">
      <div class="section-dot" style="background:var(--ok)"></div>
      <div class="section-title" style="color:var(--ok)">Analise de Defeitos</div>
    </div>
    <div class="g-2">
      <div class="card">
        <div class="t-mono t-muted" style="font-size:10px;text-transform:uppercase;margin-bottom:12px">Defeitos mais frequentes</div>
        ${ranking.map(d=>`
          <div class="bar-row">
            <div class="bar-name">${CQ.esc(d.defeito_nome||'—')}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.min((d.pct_sobre_total/maxPct)*100,100)}%;background:${barColor(d.pct_sobre_total)}"></div></div>
            <div class="bar-pct">${CQ.fmtPct(d.pct_sobre_total)}</div>
          </div>`).join('')}
      </div>
      <div class="card">
        <div class="t-mono t-muted" style="font-size:10px;text-transform:uppercase;margin-bottom:12px">Top ofensores por fornecedor</div>
        ${top10.length ? top10.map(d=>`
          <div class="bar-row">
            <div class="bar-name" title="${CQ.esc(d.fornecedor_nome)}">${CQ.esc(d.fornecedor_nome||'—')}</div>
            <div style="flex:1;font-size:11px;color:var(--muted)">${CQ.esc(d.defeito_nome||'')}</div>
            <div class="bar-pct" style="color:${d.pct_defeito>5?'var(--danger)':'var(--text)'}">${CQ.fmtPct(d.pct_defeito)}</div>
          </div>`).join('') : '<div class="t-muted" style="font-size:12px;padding:12px">Sem ofensores acima do limite.</div>'}
      </div>
    </div>`;
}


// ══════════════════════════════════════════════════════════════
// BLOCO 7: PIPELINE
// ══════════════════════════════════════════════════════════════
function renderPipeline(dados) {
  const el = document.getElementById('blocoPipeline');
  const cfg = {
    cargas_pendentes:            { label:'Cargas Pendentes',      color:'var(--warn)',   link:'lancamento_cargas.html' },
    inspecoes_andamento:         { label:'Em Andamento',          color:'var(--ok)',     link:'fila_inspecoes.html?status=em_analise' },
    inspecoes_concluidas_hoje:   { label:'Concluidas Hoje',       color:'var(--good)' },
    inspecoes_concluidas_semana: { label:'Concluidas Semana',     color:'var(--good)' },
    ncs_abertas:                 { label:'NCs Abertas',           color:'var(--danger)', link:'dashboard_nc_planos.html' },
    divergencias_abertas:        { label:'Divergencias',          color:'var(--info)' },
  };

  const items = (dados||[]).filter(d=>cfg[d.etapa]);
  el.innerHTML = `
    <div class="section-head">
      <div class="section-dot" style="background:var(--good)"></div>
      <div class="section-title" style="color:var(--good)">Pipeline Operacional</div>
    </div>` + (!items.length ? '<div class="empty-state">Sem dados operacionais.</div>' : `
    <div class="pipeline-grid">
      ${items.map(d=>{
        const c=cfg[d.etapa];
        return `<div class="pipe-card" ${c.link?`onclick="location.href='${c.link}'"`:''} style="${d.quantidade===0?'opacity:.5':''}">
          <div class="pipe-num" style="color:${c.color}">${d.quantidade}</div>
          <div class="pipe-label">${c.label}</div>
        </div>`;
      }).join('')}
    </div>`);
}

</script>
</body>
</html>
