version: '3.8'

# ══════════════════════════════════════════════════════════
# Classic CQ — n8n Orchestrator
# ══════════════════════════════════════════════════════════
# Uso:
#   cd n8n
#   cp .env.example .env   (preencha os valores)
#   docker compose up -d
#   Acesse: http://localhost:5678
# ══════════════════════════════════════════════════════════

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: classic-cq-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      # Timezone
      - GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/Sao_Paulo}
      - TZ=${TZ:-America/Sao_Paulo}

      # n8n config
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD:?Defina N8N_BASIC_AUTH_PASSWORD no .env}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678}

      # Executions — manter historico por 30 dias
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=short
      - EXECUTIONS_DATA_SAVE_ON_PROGRESS=false
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=720

      # Variaveis usadas pelos workflows
      - SUPABASE_URL=${SUPABASE_URL:?Defina SUPABASE_URL no .env}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:?Defina SUPABASE_SERVICE_KEY no .env}
      - ATAK_API_TOKEN=${ATAK_API_TOKEN:?Defina ATAK_API_TOKEN no .env}
      - ATAK_API_BASE_URL=${ATAK_API_BASE_URL:-https://api.atak.com.br/v1}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5678/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  n8n_data:
    driver: local
