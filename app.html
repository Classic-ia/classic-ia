<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic BI — Painel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a;
    --accent: #c8a96e; --accent2: #e8c98e; --text: #f0ede8; --muted: #888;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
  .bg-pattern {
    position:fixed; inset:0; z-index:0;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(200,169,110,0.03) 60px,rgba(200,169,110,0.03) 61px),
      repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(200,169,110,0.03) 60px,rgba(200,169,110,0.03) 61px);
  }
  header {
    position:sticky; top:0; z-index:100;
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:16px 32px; display:flex; align-items:center; justify-content:space-between;
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:36px; height:36px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .logo-text { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; letter-spacing:0.05em; }
  .logo-text span { color:var(--accent); }
  .header-right { display:flex; align-items:center; gap:16px; }
  #headerUser { font-size:12px; color:var(--muted); }
  .btn-sair {
    background:transparent; border:1px solid var(--border); border-radius:2px;
    color:var(--muted); font-size:11px; padding:6px 14px; cursor:pointer;
    letter-spacing:0.1em; text-transform:uppercase; transition:all 0.2s;
  }
  .btn-sair:hover { border-color:var(--accent); color:var(--accent); }

  main { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:48px 24px; }
  .welcome {
    margin-bottom:48px;
    padding-bottom:32px;
    border-bottom:1px solid var(--border);
  }
  .welcome-tag { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
  .welcome-title { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; line-height:1.1; }
  .welcome-title span { color:var(--accent); }
  .welcome-sub { font-size:14px; color:var(--muted); margin-top:8px; }

  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; }
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:2px;
    padding:28px; cursor:pointer; text-decoration:none; color:var(--text);
    display:block; transition:border-color 0.2s,transform 0.15s;
    animation:fadeIn 0.4s ease both;
  }
  .card:hover { border-color:var(--accent); transform:translateY(-2px); }
  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  .card:nth-child(1){animation-delay:0.05s}
  .card:nth-child(2){animation-delay:0.10s}
  .card:nth-child(3){animation-delay:0.15s}
  .card:nth-child(4){animation-delay:0.20s}
  .card:nth-child(5){animation-delay:0.25s}
  .card-icon { font-size:28px; margin-bottom:16px; }
  .card-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.05em; margin-bottom:6px; }
  .card-desc { font-size:12px; color:var(--muted); line-height:1.5; }
  .card-badge {
    display:inline-block; margin-top:14px;
    font-size:10px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--accent); border:1px solid rgba(200,169,110,0.3); border-radius:2px; padding:3px 8px;
  }

  .hidden { display:none !important; }

  /* ── KPI Strip ─────────────────────────────────── */
  .kpi-strip {
    position:relative; z-index:1;
    display:flex; gap:0; justify-content:center;
    background:var(--surface); border-bottom:2px solid var(--accent);
    padding:0;
  }
  .kpi-box {
    flex:1; max-width:280px;
    padding:14px 24px;
    text-align:center;
    border-right:1px solid var(--border);
  }
  .kpi-box:last-child { border-right:none; }
  .kpi-value {
    font-family:'Syne',sans-serif; font-size:28px; font-weight:800;
    color:var(--accent); line-height:1;
  }
  .kpi-label {
    font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--muted); margin-top:4px;
  }

  /* ── Section Titles ────────────────────────────── */
  .section-block { margin-bottom:48px; }
  .section-title {
    font-family:'Syne',sans-serif;
    font-size:11px; font-weight:700;
    letter-spacing:0.22em; text-transform:uppercase;
    color:var(--accent);
    margin-bottom:16px;
    padding-bottom:10px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  .section-title::before {
    content:'';
    width:3px; height:14px;
    background:var(--accent);
    border-radius:1px;
    display:inline-block;
  }

  /* ── Large Cards (Operations) ──────────────────── */
  .grid-ops {
    display:grid;
    grid-template-columns:repeat(2, 1fr);
    gap:16px;
  }
  .card-ops {
    background:var(--surface);
    border:1px solid var(--border);
    border-left:3px solid var(--accent);
    border-radius:2px;
    padding:32px 28px;
    min-height:160px;
    cursor:pointer; text-decoration:none; color:var(--text);
    display:block;
    transition:border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    animation:fadeIn 0.4s ease both;
  }
  .card-ops:hover {
    border-color:var(--accent);
    transform:translateY(-2px);
    box-shadow:0 4px 20px rgba(200,169,110,0.08);
  }
  .card-ops .card-icon { font-size:32px; margin-bottom:14px; }
  .card-ops .card-title { font-size:16px; margin-bottom:8px; }
  .card-ops .card-desc { font-size:13px; line-height:1.6; }

  /* ── 3-column grid ─────────────────────────────── */
  .grid-3 {
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:16px;
  }

  /* ── Admin Cards (dimmed) ──────────────────────── */
  .card-admin {
    opacity:0.7;
    transition:opacity 0.2s, border-color 0.2s, transform 0.15s;
  }
  .card-admin:hover {
    opacity:1;
    border-color:var(--accent);
    transform:translateY(-2px);
  }

  /* ── Responsive ────────────────────────────────── */
  @media (max-width:768px) {
    .grid-ops { grid-template-columns:1fr; }
    .grid-3   { grid-template-columns:1fr; }
    .kpi-strip { flex-direction:column; }
    .kpi-box { border-right:none; border-bottom:1px solid var(--border); }
    .kpi-box:last-child { border-bottom:none; }
    header { padding:12px 16px; }
    main { padding:32px 16px; }
  }
  @media (min-width:769px) and (max-width:1024px) {
    .grid-3 { grid-template-columns:repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="bg-pattern"></div>

<header>
  <div class="logo">
    <img id="logoImg" src="assets/logo-classic-icon.png.jpg" alt="" style="width:36px;height:36px;object-fit:contain;border-radius:2px;" onerror="this.style.display='none'">
    <div class="logo-text">CLASSIC <span>BI</span></div>
  </div>
  <div class="header-right">
    <span id="headerUser"></span>
    <button class="btn-sair" onclick="CQAuth.logout()">Sair</button>
  </div>
</header>

<!-- KPI Strip -->
<div class="kpi-strip">
  <div class="kpi-box">
    <div class="kpi-value" id="kpiCargas">&mdash;</div>
    <div class="kpi-label">Cargas hoje</div>
  </div>
  <div class="kpi-box">
    <div class="kpi-value" id="kpiInspecoes">&mdash;</div>
    <div class="kpi-label">Inspeções pendentes</div>
  </div>
  <div class="kpi-box">
    <div class="kpi-value" id="kpiFornCriticos">&mdash;</div>
    <div class="kpi-label">Fornecedores críticos</div>
  </div>
  <div class="kpi-box">
    <div class="kpi-value" id="kpiUltimaImport">&mdash;</div>
    <div class="kpi-label">Última importação</div>
  </div>
</div>

<main>
  <div class="welcome">
    <div class="welcome-tag">Classic Importação e Exportação de Couros</div>
    <div class="welcome-title">Controle de <span>Qualidade</span></div>
    <div class="welcome-sub" id="welcomeSub">Carregando...</div>
  </div>

  <!-- Sections injected by JS -->
  <div id="sectionsContainer"></div>
</main>

<script src="config.js"></script>
<script src="cq_api.js"></script>
<script src="cq_auth.js"></script>
<script>

// ── MODULE DEFINITIONS ───────────────────────────────────────────
const SECTIONS = [
  {
    id: 'operacao',
    titulo: 'Operação',
    gridClass: 'grid-ops',
    cardClass: 'card-ops',
    modulos: [
      {
        id:'recebimento_lote', titulo:'Recebimento de Lote', icon:'📦',
        href:'recebimento_lote.html',
        desc:'Registrar chegada da carga: fornecedor, lote ATAK, etiqueta, quantidade, temperatura, transporte e fotos.',
        badge:'Operação',
        perfis:['administrador','qualidade','logistica']
      },
      {
        id:'inspecao_qualidade', titulo:'Inspeção de Qualidade', icon:'🔍',
        href:'inspecao_qualidade.html',
        desc:'Defeitos padronizados, foto de evidência, OCR de etiqueta, classificação automática A/B/C e relatório PDF.',
        badge:'Principal',
        perfis:['administrador','qualidade']
      },
      {
        id:'fila_inspecoes', titulo:'Fila de Inspeções', icon:'📋',
        href:'fila_inspecoes.html',
        desc:'Fila com status de workflow, filtros por status/fornecedor/produto, contadores e acesso rápido à revisão.',
        badge:'Workflow',
        perfis:['administrador','qualidade','diretoria','financeiro']
      },
      {
        id:'rastreabilidade', titulo:'Rastreabilidade do Lote', icon:'🔎',
        href:'rastreabilidade_lote.html',
        desc:'Timeline do lote: inspeções, defeitos, fotos, transporte. Gera Relatório Técnico e Relatório ao Fornecedor em PDF.',
        badge:'PDF',
        perfis:['administrador','qualidade','comercial','financeiro','logistica','industrial','diretoria']
      }
    ]
  },
  {
    id: 'dashboards',
    titulo: 'Dashboards',
    gridClass: 'grid-ops',
    cardClass: 'card-ops',
    modulos: [
      {
        id:'dashboard_qualidade', titulo:'Dashboard Operacional', icon:'📊',
        href:'dashboard_qualidade.html',
        desc:'KPIs diários, pipeline de workflow, NCs abertas, planos de ação e tendência semanal.',
        badge:'Operacional',
        perfis:['administrador','qualidade','diretoria','financeiro']
      },
      {
        id:'dashboard_cq', titulo:'Dashboard Analítico', icon:'📈',
        href:'dashboard_cq.html',
        desc:'Fornecedores, defeitos, score, radar de risco, timeline, eficiência e mapa de defeitos — tudo em um painel.',
        badge:'Analytics',
        perfis:['administrador','qualidade','comercial','financeiro','logistica','industrial','diretoria']
      }
    ]
  },
  {
    id: 'importacao',
    titulo: 'Importação de Dados',
    gridClass: 'grid-3',
    cardClass: 'card',
    modulos: [
      {
        id:'importar_planilha', titulo:'Importar Planilha de Cargas', icon:'📊',
        href:'importar_planilha.html',
        desc:'Importe a planilha Excel (.xlsx) dos motoristas. Lê a aba FECHAMENTO com defeitos, contagem e classificação.',
        badge:'Importação',
        perfis:['administrador','qualidade']
      },
      {
        id:'importar_atak', titulo:'Importar Relatório ATAK', icon:'📥',
        href:'importar_atak.html',
        desc:'Importe o PDF WRPRD501 do ATAK. Analisa lotes, defeitos e classificação. Exporta para Supabase e CSV.',
        badge:'ATAK',
        perfis:['administrador','qualidade']
      },
      {
        id:'importar_pcr', titulo:'Importar PCR (WRMVE500)', icon:'📋',
        href:'importar_pcr.html',
        desc:'Importe a planilha WRMVE500 do ATAK (PCR). Dados de recebimento por documento, motorista, fornecedor e produto.',
        badge:'ATAK',
        perfis:['administrador','qualidade']
      },
      {
        id:'historico_importacoes', titulo:'Histórico de Importações', icon:'📦',
        href:'historico_importacoes.html',
        desc:'Consulte o histórico de todas as importações: lotes, arquivos, status, erros e rastreabilidade.',
        badge:'Importação',
        perfis:['administrador','qualidade','diretoria']
      }
    ]
  },
  {
    id: 'administracao',
    titulo: 'Administração',
    gridClass: 'grid-3',
    cardClass: 'card card-admin',
    modulos: [
      {
        id:'gestao_usuarios', titulo:'Gestão de Usuários', icon:'👥',
        href:'gestao_usuarios.html',
        desc:'Cadastrar analisadores, perfis de acesso, sessões ativas e log de auditoria.',
        badge:'Admin',
        perfis:['administrador']
      },
      {
        id:'processo_bucho', titulo:'Processo do Bucho', icon:'📋',
        href:'processo_bucho.html',
        desc:'Fluxo completo de industrialização: romaneios ATAK do recebimento à expedição. Referência MIA021.',
        badge:'Referência',
        perfis:['administrador','qualidade','logistica','industrial','diretoria']
      }
    ]
  }
];

// ── Logo from localStorage ───────────────────────────────────────
(function(){
  const s = localStorage.getItem('classic_logo');
  const el = document.getElementById('logoImg');
  if (el && s) el.src = s;
})();

// ── KPI Fetch ────────────────────────────────────────────────────
async function carregarKPIs() {
  const hoje = new Date().toISOString().slice(0, 10);

  // 1. Lotes recebidos hoje (cq_cargas + cq_recebimentos)
  try {
    let total = 0;
    try {
      const r1 = await CQ_API.get(`cq_cargas?data_coleta=eq.${hoje}&select=id`);
      total += (r1 || []).length;
    } catch(e) {}
    try {
      const r2 = await CQ_API.get(`cq_recebimentos?data_recebimento=eq.${hoje}&select=id`);
      total += (r2 || []).length;
    } catch(e) {}
    document.getElementById('kpiCargas').textContent = total;
  } catch(e) { console.warn('KPI cargas:', e); }

  // 2. Inspeções pendentes (não aprovadas/encerradas)
  try {
    const rows = await CQ_API.get('registros_cq_inspecao?status_workflow=neq.aprovada&status_workflow=neq.encerrada&select=id');
    document.getElementById('kpiInspecoes').textContent = (rows || []).length;
  } catch(e) { console.warn('KPI inspeções:', e); }

  // 3. Fornecedores críticos (classe C nos últimos 30 dias — todas as fontes)
  try {
    const d30 = new Date(Date.now() - 30 * 86400000).toISOString().slice(0, 10);
    const fornCriticos = new Set();
    try {
      const r1 = await CQ_API.get(`cq_cargas?classificacao=eq.C&data_coleta=gte.${d30}&select=frigorifico`);
      (r1 || []).forEach(r => { if (r.frigorifico) fornCriticos.add(r.frigorifico); });
    } catch(e) {}
    try {
      const r2 = await CQ_API.get(`registros_cq_inspecao?classificacao=eq.C&data_inspecao=gte.${d30}&select=fornecedor`);
      (r2 || []).forEach(r => { if (r.fornecedor) fornCriticos.add(r.fornecedor); });
    } catch(e) {}
    document.getElementById('kpiFornCriticos').textContent = fornCriticos.size;
  } catch(e) { console.warn('KPI fornecedores:', e); }

  // 4. Última importação (data mais recente de cq_importacoes)
  try {
    const rows = await CQ_API.get('cq_importacoes?order=criado_em.desc&limit=1&select=criado_em,tipo');
    if (rows && rows.length) {
      const d = new Date(rows[0].criado_em);
      const diff = Math.floor((Date.now() - d) / 60000);
      let label;
      if (diff < 1) label = 'agora';
      else if (diff < 60) label = diff + ' min';
      else if (diff < 1440) label = Math.floor(diff/60) + 'h';
      else label = Math.floor(diff/1440) + 'd';
      document.getElementById('kpiUltimaImport').textContent = label;
    } else {
      document.getElementById('kpiUltimaImport').textContent = '—';
    }
  } catch(e) { console.warn('KPI importação:', e); }
}

// ── Render Sections ──────────────────────────────────────────────
function renderSections(perfilUsuario) {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';

  SECTIONS.forEach(section => {
    const visiveis = section.modulos.filter(m => m.perfis.includes(perfilUsuario));
    if (visiveis.length === 0) return;

    const block = document.createElement('div');
    block.className = 'section-block';

    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = section.titulo;
    block.appendChild(title);

    const grid = document.createElement('div');
    grid.className = section.gridClass;

    visiveis.forEach((m, i) => {
      const a = document.createElement('a');
      a.className = section.cardClass;
      a.href = m.href;
      a.style.animationDelay = (i * 0.05 + 0.05) + 's';
      a.innerHTML = `
        <div class="card-icon">${m.icon}</div>
        <div class="card-title">${m.titulo}</div>
        <div class="card-desc">${m.desc}</div>
        <div class="card-badge">${m.badge}</div>`;
      grid.appendChild(a);
    });

    block.appendChild(grid);
    container.appendChild(block);
  });
}

// ── Init ─────────────────────────────────────────────────────────
(async () => {
  const perfil = await CQAuth.init();
  if (!perfil) return;

  document.getElementById('headerUser').textContent =
    (perfil.nome || perfil.email) + ' \u00b7 ' + traduzPerfil(perfil.perfil);
  document.getElementById('welcomeSub').textContent =
    'Bem-vindo, ' + (perfil.nome || perfil.email) + '. Selecione um módulo abaixo.';

  renderSections(perfil.perfil);
  carregarKPIs();
})();

function traduzPerfil(p) {
  const t = {administrador:'Administrador',qualidade:'Qualidade',comercial:'Comercial',financeiro:'Financeiro',logistica:'Logística',industrial:'Industrial',diretoria:'Diretoria'};
  return t[p] || p;
}
</script>
</body>
</html>
