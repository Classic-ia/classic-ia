<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic CQ — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg: #0a0d14; --surface: #111520; --surface2: #161c2c;
    --border: #252d42; --accent: #e8a020; --green: #2dce6e;
    --red: #e03535; --text: #dde2ef; --text2: #6b7a99;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .login-wrap { width: 100%; max-width: 380px; }
  .logo-area { text-align: center; margin-bottom: 36px; }
  .logo-sub { font-family: var(--mono); font-size: 10px; color: var(--text2); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
  .logo-title { font-family: var(--mono); font-size: 24px; font-weight: 600; color: var(--accent); letter-spacing: 0.05em; }
  .logo-title span { color: var(--text2); font-weight: 400; }
  .logo-desc { font-size: 12px; color: var(--text2); margin-top: 6px; }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 28px; position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 3px; background: var(--accent);
  }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 10px; font-family: var(--mono);
    color: var(--text2); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
  }
  .field input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: var(--sans); font-size: 14px;
    padding: 11px 13px; border-radius: 4px; outline: none; transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-login {
    width: 100%; background: var(--accent); color: #000; border: none;
    font-family: var(--mono); font-size: 13px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    padding: 13px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s; margin-top: 6px;
  }
  .btn-login:hover { background: #f0b030; }
  .btn-login:disabled { background: var(--border); color: var(--text2); cursor: not-allowed; }
  .erro-box {
    background: #2e0808; color: #f08080; border: 1px solid #5a1515;
    font-family: var(--mono); font-size: 12px; padding: 10px 14px;
    border-radius: 4px; margin-top: 14px; display: none;
  }
  .footer { text-align: center; margin-top: 20px; font-family: var(--mono); font-size: 10px; color: var(--text2); }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-sub">Classic Importação e Exportação</div>
    <div class="logo-title">SISTEMA <span>//</span> CQ</div>
    <div class="logo-desc">Controle de Qualidade — Miúdos Bovinos</div>
  </div>
  <div class="card">
    <div class="card-title">Acesso ao sistema</div>
    <div class="field">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') entrar()">
    </div>
    <button class="btn-login" id="btn-login" onclick="entrar()">▶ ENTRAR</button>
    <div class="erro-box" id="erro-box"></div>
  </div>
  <div class="footer">CLASSIC IMPORTAÇÃO E EXPORTAÇÃO DE COUROS LTDA</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://nvqxsulntpftcwtkjedu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im52cXhzdWxudHBmdGN3dGtqZWR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTIwODksImV4cCI6MjA4ODkyODA4OX0.JvahlmaqJUzd2FQp-27uADe3mL7Wccg68PA2_3YWRhw';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

async function hashSenha(senha) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(senha));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function salvarSessao(usuario) {
  localStorage.setItem('cq_sessao', JSON.stringify({
    usuario: { id: usuario.id, nome: usuario.nome, email: usuario.email, perfil: usuario.perfil },
    salvoEm: new Date().toISOString()
  }));
}

async function entrar() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const erro = document.getElementById('erro-box');
  const btn = document.getElementById('btn-login');

  if (!email || !senha) { mostrarErro('Preencha e-mail e senha'); return; }

  btn.disabled = true; btn.textContent = 'VERIFICANDO...';
  erro.style.display = 'none';

  try {
    const hash = await hashSenha(senha);
    const { data, error } = await db.from('usuarios')
      .select('*').eq('email', email).eq('senha_hash', hash).eq('ativo', true).single();

    if (error || !data) { mostrarErro('E-mail ou senha incorretos'); return; }

    salvarSessao(data);

    // Redireciona por perfil
    const destinos = {
      gestor: 'index.html',
      analisador: 'formulario_cq.html',
      conferente: 'conferencia_quantidade.html',
      financeiro: 'calculadora_financeira.html',
      qualidade_externo: 'dashboard_cq.html'
    };
    window.location.href = destinos[data.perfil] || 'index.html';

  } catch(e) {
    mostrarErro('Erro de conexão: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '▶ ENTRAR';
  }
}

function mostrarErro(msg) {
  const e = document.getElementById('erro-box');
  e.textContent = '⚠ ' + msg; e.style.display = 'block';
  document.getElementById('btn-login').disabled = false;
  document.getElementById('btn-login').textContent = '▶ ENTRAR';
}

// Se já logado, vai direto
const sess = localStorage.getItem('cq_sessao');
if (sess) {
  try {
    const s = JSON.parse(sess);
    const diff = (new Date() - new Date(s.salvoEm)) / 3600000;
    if (diff < 8) window.location.href = 'index.html';
  } catch {}
}
</script>
</body>
</html>
