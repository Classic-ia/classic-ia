<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qualidade por Estado · Classic CQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #080808; --s1: #101010; --s2: #161616; --s3: #1e1e1e;
  --border: #242424; --border2: #2e2e2e;
  --accent: #c8a96e; --accent2: #e8c98e; --accent3: #a07840;
  --text: #ede9e3; --muted: #666; --muted2: #444;
  --cb-blue: #0072B2; --cb-teal: #009E73; --cb-orange: #E69F00;
  --cb-purple: #CC79A7; --cb-red: #D55E00; --cb-gray: #666666;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(8,8,8,.92); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 56px;
  display: flex; align-items: center; gap: 12px;
}
.header-logo { width: 32px; height: 32px; object-fit: contain; border-radius: 6px; }
.header-title { font-family: 'Syne'; font-weight: 800; font-size: 16px; color: var(--accent); }
.header-sub { font-size: 11px; color: var(--muted); }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.header-user { font-size: 12px; color: var(--muted); }
.header-user strong { color: var(--text); }
.header-avatar {
  width: 32px; height: 32px; border-radius: 50%; background: var(--accent3);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne'; font-weight: 700; font-size: 13px; color: var(--bg);
}
.btn-sm {
  padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--muted);
  transition: all .2s; text-decoration: none;
}
.btn-sm:hover { border-color: var(--accent); color: var(--text); }
.main { max-width: 1400px; margin: 0 auto; padding: 20px 24px 40px; }
.section-title {
  font-family: 'Syne'; font-weight: 700; font-size: 13px; color: var(--accent);
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.filter-bar {
  display: flex; align-items: center; gap: 10px; margin-bottom: 24px; flex-wrap: wrap;
}
.filter-bar label { font-family: 'DM Mono'; font-size: 11px; color: var(--muted); text-transform: uppercase; }
.filter-bar select {
  background: var(--s2); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-family: 'DM Mono'; font-size: 12px; padding: 6px 10px;
}
.btn-refresh {
  padding: 6px 14px; background: var(--s2); border: 1px solid var(--border);
  border-radius: 6px; color: var(--accent); font-size: 12px; cursor: pointer;
  font-family: 'DM Mono'; transition: all .2s;
}
.btn-refresh:hover { background: var(--accent3); color: var(--bg); }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 28px; }
.kpi-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 16px; border-left: 4px solid var(--muted2);
}
.kpi-num { font-family: 'Syne'; font-weight: 800; font-size: 28px; line-height: 1; margin-bottom: 6px; }
.kpi-label { font-family: 'DM Mono'; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
.kpi-sub { font-family: 'DM Mono'; font-size: 10px; color: var(--muted2); margin-top: 4px; }
.kpi-card[data-color="blue"]   { border-left-color: var(--cb-blue); }   .kpi-card[data-color="blue"] .kpi-num   { color: var(--cb-blue); }
.kpi-card[data-color="teal"]   { border-left-color: var(--cb-teal); }   .kpi-card[data-color="teal"] .kpi-num   { color: var(--cb-teal); }
.kpi-card[data-color="orange"] { border-left-color: var(--cb-orange); } .kpi-card[data-color="orange"] .kpi-num { color: var(--cb-orange); }
.kpi-card[data-color="red"]    { border-left-color: var(--cb-red); }    .kpi-card[data-color="red"] .kpi-num    { color: var(--cb-red); }
.kpi-card[data-color="accent"] { border-left-color: var(--accent); }    .kpi-card[data-color="accent"] .kpi-num { color: var(--accent); }
.kpi-card[data-color="purple"] { border-left-color: var(--cb-purple); } .kpi-card[data-color="purple"] .kpi-num { color: var(--cb-purple); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }
@media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }

.panel { background: var(--s1); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.panel-title {
  font-family: 'Syne'; font-weight: 700; font-size: 13px; color: var(--accent);
  text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px;
}

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th {
  background: var(--s2); color: var(--muted); font-family: 'DM Mono';
  font-weight: 500; font-size: 10px; text-transform: uppercase;
  padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border);
}
tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
tbody tr:hover { background: var(--s2); }

.score-bar { display: flex; align-items: center; gap: 8px; }
.score-track { flex: 1; height: 6px; background: var(--s3); border-radius: 3px; overflow: hidden; }
.score-fill { height: 100%; border-radius: 3px; transition: width .3s; }
.score-val { font-family: 'DM Mono'; font-size: 12px; font-weight: 700; min-width: 32px; }

.chart-wrap {
  background: var(--s1); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; margin-bottom: 28px;
}
.chart-box { max-height: 350px; position: relative; }

.btn-drill {
  padding: 4px 10px; border-radius: 4px; font-size: 10px; cursor: pointer;
  border: 1px solid var(--border); background: transparent; color: var(--accent);
  font-family: 'DM Mono'; transition: all .2s; text-decoration: none;
}
.btn-drill:hover { background: var(--accent3); color: var(--bg); }

.toggle-group { display: inline-flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.toggle-btn {
  padding: 5px 12px; font-family: 'DM Mono'; font-size: 10px; cursor: pointer;
  background: transparent; color: var(--muted); border: none; transition: all .2s;
}
.toggle-btn.active { background: var(--accent3); color: var(--bg); }

.loading { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
.spin { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }

@media (max-width: 600px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .main { padding: 12px 12px 32px; }
}
</style>
</head>
<body>

<header class="header">
  <img id="logoImg" class="header-logo" src="assets/logo-classic-icon.png.jpg" alt="">
  <div>
    <div class="header-title">Qualidade por Estado</div>
    <div class="header-sub">Drill-Down Analítico por UF · Classic CQ</div>
  </div>
  <div class="header-right">
    <div class="header-user" id="userInfo"></div>
    <div class="header-avatar" id="userAvatar"></div>
    <button class="btn-sm" onclick="CQAuth.logout()">Sair</button>
    <a class="btn-sm" href="app.html">&#8592; Menu</a>
  </div>
</header>

<main class="main">
  <div id="loadingState" class="loading"><span class="spin">&#9203;</span> Carregando dados...</div>
  <div id="dashContent" style="display:none;">

    <!-- FILTROS -->
    <div class="filter-bar">
      <label>Período</label>
      <select id="filtroPeriodo" onchange="carregarDados()">
        <option value="90">Últimos 90 dias</option>
        <option value="30">Últimos 30 dias</option>
        <option value="180">Últimos 180 dias</option>
        <option value="365">Último ano</option>
        <option value="0">Todos</option>
      </select>
      <label>Produto</label>
      <select id="filtroProduto" onchange="aplicarFiltros()"><option value="">Todos</option></select>
      <label>Status</label>
      <select id="filtroStatus" onchange="aplicarFiltros()">
        <option value="">Todos</option>
        <option value="aprovado">Aprovado</option>
        <option value="ressalva">Ressalva</option>
        <option value="bloqueado">Bloqueado</option>
      </select>
      <button class="btn-refresh" onclick="carregarDados()">&#8635; Atualizar</button>
      <span id="lastUpdate" style="font-family:'DM Mono';font-size:10px;color:var(--muted);margin-left:auto;"></span>
    </div>

    <!-- KPIs -->
    <div class="section-title">&#127279; Indicadores por Estado</div>
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- RANKING -->
    <div class="section-title" style="margin-top:28px;">&#128203; Ranking por Estado</div>
    <div class="panel">
      <div class="table-wrap" id="rankingEstado"></div>
    </div>

    <!-- COMPARATIVO BLOQUEIOS -->
    <div class="section-title" style="margin-top:28px;">&#128200; Comparativo de Bloqueios</div>
    <div class="chart-wrap">
      <div class="chart-box"><canvas id="chartBloqueios"></canvas></div>
    </div>

    <!-- EVOLUÇÃO TEMPORAL -->
    <div class="section-title" style="margin-top:0;">&#128201; Evolução Temporal</div>
    <div class="chart-wrap">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
        <div class="toggle-group">
          <button class="toggle-btn active" data-metric="taxa_aprovacao" onclick="setMetric(this)">&#10004; Aprovação</button>
          <button class="toggle-btn" data-metric="taxa_bloqueio" onclick="setMetric(this)">&#10006; Bloqueio</button>
          <button class="toggle-btn" data-metric="media_defeitos" onclick="setMetric(this)">&#9888; Defeitos</button>
        </div>
      </div>
      <div class="chart-box" style="max-height:400px;"><canvas id="chartEvolucao"></canvas></div>
    </div>

  </div>
</main>

<script src="config.js"></script>
<script src="cq_api.js"></script>
<script src="cq_auth.js"></script>
<script src="cq_workflow.js"></script>
<script>
let _inspecoes = [], _cadastros = [];
let _filtrado = [];
let chartBloqueios = null, chartEvolucao = null;
let _metricaAtual = 'taxa_aprovacao';

const COR_PALETTE = ['#0072B2','#009E73','#E69F00','#CC79A7','#D55E00','#56B4E9','#F0E442','#999999','#0072B2','#009E73'];

(async function(){
  const logo = localStorage.getItem('classic_logo');
  if (logo) document.getElementById('logoImg').src = logo;

  const usuario = await CQAuth.init({
    perfisPermitidos: ['administrador','qualidade','diretoria','financeiro','comercial'],
    redirectLogin: true
  });
  if (!usuario) return;

  document.getElementById('userInfo').innerHTML =
    `<strong>${usuario.nome || usuario.email}</strong><br>${usuario.perfil.toUpperCase()}`;
  document.getElementById('userAvatar').textContent =
    (usuario.nome || usuario.email).charAt(0).toUpperCase();

  await carregarDados();
})();

// apiFetch provided by cq_api.js

function diasAtras(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  return d.toISOString().slice(0,10);
}

async function carregarDados() {
  const periodo = parseInt(document.getElementById('filtroPeriodo').value);
  const filtroData = periodo > 0 ? `&data_inspecao=gte.${diasAtras(periodo)}` : '';

  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('dashContent').style.display = 'none';

  try {
    [_inspecoes, _cadastros] = await Promise.all([
      apiFetch(`registros_cq_inspecao?select=fornecedor,fornecedor_codigo,data_inspecao,classificacao,percentual_defeitos,status_final,produto${filtroData}&order=data_inspecao`),
      apiFetch('cadastros_atak?select=codigo,nome,uf&tipo=eq.fornecedor&ativo=eq.true')
    ]);

    populaFiltros();
    aplicarFiltros();

    document.getElementById('lastUpdate').textContent =
      'Atualizado: ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
  } catch(e) { console.error('Erro:', e); }

  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('dashContent').style.display = 'block';
}

function populaFiltros() {
  const selProd = document.getElementById('filtroProduto');
  const v = selProd.value;
  const prods = [...new Set(_inspecoes.map(i => i.produto).filter(Boolean))].sort();
  selProd.innerHTML = '<option value="">Todos</option>' + prods.map(p => `<option value="${p}">${p}</option>`).join('');
  selProd.value = v;
}

function aplicarFiltros() {
  const produto = document.getElementById('filtroProduto').value;
  const status = document.getElementById('filtroStatus').value;

  _filtrado = _inspecoes.filter(i => {
    if (produto && i.produto !== produto) return false;
    if (status && i.status_final !== status) return false;
    return true;
  });

  renderAll();
}

function getUF(codigo) {
  const c = _cadastros.find(c => c.codigo === codigo);
  return c ? (c.uf || 'N/D') : 'N/D';
}

function agruparPorEstado(dados) {
  const map = {};
  dados.forEach(i => {
    const uf = getUF(i.fornecedor_codigo);
    if (!map[uf]) map[uf] = { estado: uf, total: 0, aprovadas: 0, ressalvas: 0, bloqueios: 0, somaPct: 0, a: 0, b: 0, c: 0 };
    const g = map[uf];
    g.total++;
    if (i.status_final === 'aprovado') g.aprovadas++;
    if (i.status_final === 'ressalva') g.ressalvas++;
    if (i.status_final === 'bloqueado') g.bloqueios++;
    g.somaPct += parseFloat(i.percentual_defeitos) || 0;
    if (i.classificacao === 'A') g.a++;
    if (i.classificacao === 'B') g.b++;
    if (i.classificacao === 'C') g.c++;
  });

  return Object.values(map).map(g => ({
    ...g,
    taxa_aprovacao: g.total ? +(g.aprovadas / g.total * 100).toFixed(1) : 0,
    taxa_bloqueio: g.total ? +(g.bloqueios / g.total * 100).toFixed(1) : 0,
    media_defeitos: g.total ? +(g.somaPct / g.total).toFixed(2) : 0,
    score_cq: g.total ? Math.max(0, Math.min(100, Math.round(
      100 - (g.c / g.total * 50) - (g.b / g.total * 20) + (g.a / g.total * 20)
    ))) : 0
  })).sort((a, b) => b.score_cq - a.score_cq);
}

function renderAll() {
  const estados = agruparPorEstado(_filtrado);
  renderKPIs(estados);
  renderRanking(estados);
  renderChartBloqueios(estados);
  renderEvolucao();
}

function renderKPIs(estados) {
  const totalInsp = _filtrado.length;
  const melhor = estados.length ? estados[0] : null;
  const pior = estados.length ? estados[estados.length - 1] : null;
  const taxaBloqMedia = totalInsp
    ? (_filtrado.filter(i => i.status_final === 'bloqueado').length / totalInsp * 100).toFixed(1)
    : '0.0';

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi-card" data-color="teal">
      <div class="kpi-num">&#10004; ${melhor ? melhor.estado : '—'}</div>
      <div class="kpi-label">Melhor estado</div>
      ${melhor ? `<div class="kpi-sub">Score ${melhor.score_cq} · ${melhor.taxa_aprovacao}% aprov.</div>` : ''}
    </div>
    <div class="kpi-card" data-color="red">
      <div class="kpi-num">&#10006; ${pior ? pior.estado : '—'}</div>
      <div class="kpi-label">Pior estado</div>
      ${pior ? `<div class="kpi-sub">Score ${pior.score_cq} · ${pior.taxa_bloqueio}% bloq.</div>` : ''}
    </div>
    <div class="kpi-card" data-color="orange">
      <div class="kpi-num">&#9888; ${taxaBloqMedia}%</div>
      <div class="kpi-label">Taxa média bloqueio</div>
    </div>
    <div class="kpi-card" data-color="accent">
      <div class="kpi-num">&#128203; ${totalInsp}</div>
      <div class="kpi-label">Total inspeções</div>
    </div>
    <div class="kpi-card" data-color="purple">
      <div class="kpi-num">&#127279; ${estados.length}</div>
      <div class="kpi-label">Estados ativos</div>
    </div>
  `;
}

function renderRanking(estados) {
  if (!estados.length) {
    document.getElementById('rankingEstado').innerHTML = '<div class="empty">Nenhuma inspeção encontrada</div>';
    return;
  }

  const scoreColor = s => s < 50 ? 'var(--cb-red)' : s < 70 ? 'var(--cb-orange)' : s < 85 ? 'var(--cb-blue)' : 'var(--cb-teal)';

  document.getElementById('rankingEstado').innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>UF</th><th>Score CQ</th><th>Inspeções</th>
        <th>&#10004; Aprov.</th><th>&#9888; Ress.</th><th>&#10006; Bloq.</th>
        <th>% Aprov.</th><th>% Bloq.</th><th>Méd. Def.</th><th></th>
      </tr></thead>
      <tbody>
        ${estados.map((e, i) => `<tr>
          <td style="font-family:'DM Mono';color:var(--muted)">${i+1}</td>
          <td style="font-family:'Syne';font-weight:700;font-size:14px;">${e.estado}</td>
          <td>
            <div class="score-bar">
              <div class="score-track"><div class="score-fill" style="width:${e.score_cq}%;background:${scoreColor(e.score_cq)}"></div></div>
              <span class="score-val" style="color:${scoreColor(e.score_cq)}">${e.score_cq}</span>
            </div>
          </td>
          <td style="font-family:'DM Mono'">${e.total}</td>
          <td style="color:var(--cb-teal);font-family:'DM Mono'">${e.aprovadas}</td>
          <td style="color:var(--cb-orange);font-family:'DM Mono'">${e.ressalvas}</td>
          <td style="color:var(--cb-red);font-family:'DM Mono'">${e.bloqueios}</td>
          <td style="font-family:'DM Mono'">${e.taxa_aprovacao}%</td>
          <td style="font-family:'DM Mono';color:${e.taxa_bloqueio > 15 ? 'var(--cb-red)' : e.taxa_bloqueio > 5 ? 'var(--cb-orange)' : 'var(--muted)'}">${e.taxa_bloqueio}%</td>
          <td style="font-family:'DM Mono'">${e.media_defeitos}%</td>
          <td><a class="btn-drill" href="dashboard_fornecedores_por_estado.html?uf=${encodeURIComponent(e.estado)}">Ver fornecedores &#8594;</a></td>
        </tr>`).join('')}
      </tbody>
    </table>
  `;
}

function renderChartBloqueios(estados) {
  const sorted = estados.slice().sort((a, b) => b.taxa_bloqueio - a.taxa_bloqueio).slice(0, 15);
  const canvas = document.getElementById('chartBloqueios');
  if (!sorted.length || !canvas) return;

  if (chartBloqueios) chartBloqueios.destroy();
  chartBloqueios = new Chart(canvas, {
    type: 'bar',
    data: {
      labels: sorted.map(e => e.estado),
      datasets: [{
        label: '% Bloqueio',
        data: sorted.map(e => e.taxa_bloqueio),
        backgroundColor: sorted.map(e =>
          e.taxa_bloqueio >= 15 ? 'rgba(213,94,0,.7)' :
          e.taxa_bloqueio >= 5 ? 'rgba(230,159,0,.7)' : 'rgba(0,114,178,.7)'
        ),
        borderRadius: 3
      }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.parsed.x}% bloqueio (${sorted[ctx.dataIndex].total} inspeções)` } }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#666', font: { family: 'DM Mono', size: 10 }, callback: v => v + '%' } },
        y: { grid: { display: false }, ticks: { color: '#999', font: { family: 'DM Mono', size: 11 } } }
      }
    }
  });
}

function setMetric(btn) {
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _metricaAtual = btn.dataset.metric;
  renderEvolucao();
}

function renderEvolucao() {
  const canvas = document.getElementById('chartEvolucao');
  if (!canvas || !_filtrado.length) {
    if (chartEvolucao) { chartEvolucao.destroy(); chartEvolucao = null; }
    return;
  }

  const porMesUF = {};
  const ufVolume = {};

  _filtrado.forEach(i => {
    const uf = getUF(i.fornecedor_codigo);
    const mes = (i.data_inspecao || '').slice(0, 7);
    if (!mes) return;
    ufVolume[uf] = (ufVolume[uf] || 0) + 1;
    const key = `${mes}|${uf}`;
    if (!porMesUF[key]) porMesUF[key] = { total: 0, aprovadas: 0, bloqueios: 0, somaPct: 0 };
    porMesUF[key].total++;
    if (i.status_final === 'aprovado') porMesUF[key].aprovadas++;
    if (i.status_final === 'bloqueado') porMesUF[key].bloqueios++;
    porMesUF[key].somaPct += parseFloat(i.percentual_defeitos) || 0;
  });

  const topUFs = Object.entries(ufVolume).sort((a, b) => b[1] - a[1]).slice(0, 5).map(e => e[0]);
  const meses = [...new Set(Object.keys(porMesUF).map(k => k.split('|')[0]))].sort();
  if (!meses.length || !topUFs.length) return;

  const datasets = topUFs.map((uf, idx) => ({
    label: uf,
    data: meses.map(m => {
      const g = porMesUF[`${m}|${uf}`];
      if (!g || !g.total) return null;
      if (_metricaAtual === 'taxa_aprovacao') return +(g.aprovadas / g.total * 100).toFixed(1);
      if (_metricaAtual === 'taxa_bloqueio') return +(g.bloqueios / g.total * 100).toFixed(1);
      return +(g.somaPct / g.total).toFixed(2);
    }),
    borderColor: COR_PALETTE[idx],
    backgroundColor: COR_PALETTE[idx] + '33',
    borderWidth: 2, pointRadius: 4,
    pointBackgroundColor: COR_PALETTE[idx],
    tension: 0.3, spanGaps: true
  }));

  const metricLabel = _metricaAtual === 'taxa_aprovacao' ? '% Aprovação'
    : _metricaAtual === 'taxa_bloqueio' ? '% Bloqueio' : '% Defeitos';

  if (chartEvolucao) chartEvolucao.destroy();
  chartEvolucao = new Chart(canvas, {
    type: 'line',
    data: { labels: meses, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#999', font: { family: 'DM Mono', size: 10 } } },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,.04)' }, ticks: { color: '#666', font: { family: 'DM Mono', size: 10 } } },
        y: {
          grid: { color: 'rgba(255,255,255,.04)' },
          ticks: { color: '#666', font: { family: 'DM Mono', size: 10 }, callback: v => v + '%' },
          title: { display: true, text: metricLabel, color: '#666', font: { family: 'DM Mono', size: 10 } }
        }
      }
    }
  });
}
</script>
</body>
</html>
