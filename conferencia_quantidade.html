<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic CQ — Conferência</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0a;--surface:#141414;--border:#2a2a2a;--accent:#c8a96e;--accent2:#e8c98e;--text:#f0ede8;--muted:#888;--error:#e05c5c;--success:#5cb85c;--warning:#f0a844;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
  header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
  .hlogo{display:flex;align-items:center;gap:10px;}
  .hlogo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .hlogo-text{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;}
  .hlogo-text span{color:var(--accent);}
  .nav-back{color:var(--muted);font-size:11px;text-decoration:none;letter-spacing:0.1em;margin-right:12px;}
  .hright{display:flex;align-items:center;gap:10px;}
  #huser{font-size:11px;color:var(--muted);}
  .btn-sair{background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-size:10px;padding:5px 10px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;}
  main{max-width:700px;margin:0 auto;padding:36px 20px;}
  h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;}
  .sub{font-size:13px;color:var(--muted);margin-bottom:28px;}
  .panel{background:var(--surface);border:1px solid var(--border);border-radius:2px;padding:24px;margin-bottom:20px;}
  .panel-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  @media(max-width:540px){.grid2{grid-template-columns:1fr;}}
  label{display:block;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:2px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 13px;outline:none;transition:border-color 0.2s;}
  input:focus,select:focus{border-color:var(--accent);}
  input:read-only{opacity:0.6;}
  .btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:2px;color:#0a0a0a;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:13px 24px;cursor:pointer;transition:opacity 0.2s;width:100%;}
  .btn:hover{opacity:0.88;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-ghost{background:transparent;border:1px solid var(--border);border-radius:2px;color:var(--muted);font-family:'Syne',sans-serif;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;padding:11px 20px;cursor:pointer;transition:all 0.2s;width:100%;}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
  .msg{margin-top:14px;padding:12px 14px;border-radius:2px;font-size:13px;display:none;}
  .msg.error{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);color:var(--error);display:block;}
  .msg.success{background:rgba(92,184,92,0.1);border:1px solid rgba(92,184,92,0.3);color:var(--success);display:block;}
  .msg.warn{background:rgba(240,168,68,0.1);border:1px solid rgba(240,168,68,0.3);color:var(--warning);display:block;}
  .badge{display:inline-block;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;border-radius:2px;padding:4px 10px;}
  .badge-A{background:rgba(92,184,92,0.15);color:var(--success);}
  .badge-B{background:rgba(240,168,68,0.15);color:var(--warning);}
  .badge-C{background:rgba(224,92,92,0.15);color:var(--error);}
  .lote-card{background:#1c1c1c;border:1px solid var(--border);border-radius:2px;padding:14px;margin-bottom:8px;cursor:pointer;transition:border-color 0.2s;}
  .lote-card:hover{border-color:var(--accent);}
  .lote-card.selected{border-color:var(--accent);background:rgba(200,169,110,0.05);}
  .lote-nome{font-weight:500;font-size:13px;}
  .lote-info{font-size:11px;color:var(--muted);margin-top:3px;}
  .loading{text-align:center;color:var(--muted);padding:24px;font-size:13px;}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,0,0,0.3);border-top-color:#0a0a0a;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .diverg-ok{color:var(--success);}
  .diverg-warn{color:var(--warning);}
  .diverg-err{color:var(--error);}
</style>
</head>

<main>
  <h1>Conferência de Quantidade</h1>
  <div class="sub">Registre a quantidade física recebida e identifique divergências com a NF.</div>

  <!-- Busca de lote -->
  <div class="panel">
    <div class="panel-title">Buscar Lote</div>
    <div class="grid2">
      <div>
        <label>Fornecedor</label>
        <input type="text" id="buscaForn" placeholder="Nome do fornecedor" oninput="buscarLotes()">
      </div>
      <div>
        <label>Lote Atak / Requisição</label>
        <input type="text" id="buscaLote" placeholder="Número do lote" oninput="buscarLotes()">
      </div>
    </div>
    <div style="margin-top:14px;">
      <select id="filtroStatus" onchange="buscarLotes()" style="width:auto;min-width:200px;">
        <option value="pendente">Apenas pendentes (sem qtd física)</option>
        <option value="todos">Todos os lotes</option>
        <option value="conferido">Apenas conferidos</option>
      </select>
    </div>
    <div id="listaLotes" style="margin-top:16px;"></div>
  </div>

  <!-- Conferência -->
  <div class="panel" id="painelConf" style="display:none;">
    <div class="panel-title">Registrar Quantidade Física</div>

    <div style="margin-bottom:16px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:3px;letter-spacing:0.1em;text-transform:uppercase;">Lote selecionado</div>
      <div style="font-size:15px;font-weight:500;" id="loteSel">—</div>
      <div style="margin-top:6px;display:flex;gap:8px;flex-wrap:wrap;">
        <span class="badge" id="loteClasse">—</span>
        <span style="font-size:12px;color:var(--muted);" id="lotePct"></span>
      </div>
    </div>

    <div class="grid2" style="margin-bottom:16px;">
      <div>
        <label>Qtd NF</label>
        <input type="number" id="qtdNF" readonly>
      </div>
      <div>
        <label>Qtd Física (conferida)</label>
        <input type="number" id="qtdFisica" min="0" placeholder="0" oninput="calcDiverg()">
      </div>
    </div>

    <div id="divergBox" style="margin-bottom:16px;padding:14px;background:#1c1c1c;border:1px solid var(--border);border-radius:2px;display:none;">
      <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Divergência</div>
      <div style="font-size:20px;font-weight:700;" id="divergVal">—</div>
      <div style="font-size:12px;margin-top:4px;" id="divergDesc">—</div>
    </div>

    <div style="margin-bottom:16px;">
      <label>Conferente</label>
      <input type="text" id="conferente" readonly>
    </div>

    <button class="btn" id="btnConf" onclick="salvarConferencia()">Salvar Conferência</button>
    <div class="msg" id="msgConf"></div>
    <div style="margin-top:10px;">
      <button class="btn-ghost" onclick="limparSelecao()">← Selecionar outro lote</button>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
let loteSelecionadoId = null;
let debounceTimer;

(async () => {
  const perfil = await authGuard(['logistica','administrador','industrial']);
  if (!perfil) return;
  document.getElementById('huser').textContent = perfil.nome;
  document.getElementById('conferente').value = perfil.nome;
  await buscarLotes();
})();

function buscarLotes() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(_buscarLotes, 400);
}

async function _buscarLotes() {
  const forn = document.getElementById('buscaForn').value.trim();
  const lote = document.getElementById('buscaLote').value.trim();
  const status = document.getElementById('filtroStatus').value;

  let query = sb.from('registros_cq').select('id,fornecedor,lote_atak,numero_requisicao,data_entrada,classificacao,percentual_defeito,qtd_declarada,qtd_recebida').order('data_entrada',{ascending:false}).limit(30);

  if (forn) query = query.ilike('fornecedor','%'+forn+'%');
  if (lote) query = query.or(`lote_atak.ilike.%${lote}%,numero_requisicao.ilike.%${lote}%`);
  if (status === 'pendente') query = query.is('qtd_recebida',null);
  if (status === 'conferido') query = query.not('qtd_recebida','is',null);

  const { data, error } = await query;
  const container = document.getElementById('listaLotes');

  if (error) { container.innerHTML = '<div class="loading">Erro ao buscar.</div>'; return; }
  if (!data?.length) { container.innerHTML = '<div class="loading">Nenhum lote encontrado.</div>'; return; }

  container.innerHTML = data.map(r => `
    <div class="lote-card" onclick="selecionarLote('${r.id}','${r.fornecedor||''}','${r.lote_atak||''}','${r.numero_requisicao||''}','${r.classificacao||''}',${r.percentual_defeito||0},${r.qtd_declarada||0},'${r.data_entrada||''}')">
      <div class="lote-nome">${r.fornecedor||'—'} · Lote ${r.lote_atak||r.id.slice(0,8)}</div>
      <div class="lote-info">
        Req: ${r.numero_requisicao||'—'} · ${r.data_entrada||'—'} · 
        Classe <strong>${r.classificacao||'—'}</strong> · 
        Qtd NF: ${r.qtd_declarada||'—'} · 
        ${r.qtd_recebida ? '✓ Conferido: '+r.qtd_recebida : '⏳ Pendente'}
      </div>
    </div>`).join('');
}

function selecionarLote(id, forn, loteAtak, req, classe, pct, qtdNF, data) {
  loteSelecionadoId = id;
  document.getElementById('loteSel').textContent = `${forn} · Lote ${loteAtak||id.slice(0,8)} · Req ${req||'—'}`;
  const cl = document.getElementById('loteClasse');
  cl.textContent = 'Classe ' + (classe||'—');
  cl.className = 'badge badge-'+(classe||'');
  document.getElementById('lotePct').textContent = pct.toFixed(1) + '% defeito';
  document.getElementById('qtdNF').value = qtdNF;
  document.getElementById('qtdFisica').value = '';
  document.getElementById('divergBox').style.display = 'none';
  document.getElementById('msgConf').className = 'msg';
  document.getElementById('painelConf').style.display = 'block';
  document.getElementById('painelConf').scrollIntoView({behavior:'smooth'});
}

function limparSelecao() {
  loteSelecionadoId = null;
  document.getElementById('painelConf').style.display = 'none';
}

function calcDiverg() {
  const nf = parseInt(document.getElementById('qtdNF').value)||0;
  const fis = parseInt(document.getElementById('qtdFisica').value)||0;
  if (!fis) { document.getElementById('divergBox').style.display='none'; return; }
  const dif = fis - nf;
  const box = document.getElementById('divergBox');
  const val = document.getElementById('divergVal');
  const desc = document.getElementById('divergDesc');
  box.style.display = 'block';
  if (dif === 0) {
    val.textContent = 'Confere ✓'; val.className = 'diverg-ok';
    desc.textContent = 'Quantidade física igual à NF.';
  } else if (dif > 0) {
    val.textContent = '+' + dif + ' peças'; val.className = 'diverg-warn';
    desc.textContent = 'Sobraram ' + dif + ' peças em relação à NF.';
  } else {
    val.textContent = dif + ' peças'; val.className = 'diverg-err';
    desc.textContent = 'Faltaram ' + Math.abs(dif) + ' peças em relação à NF.';
  }
}

async function salvarConferencia() {
  if (!loteSelecionadoId) return;
  const qtdFis = parseInt(document.getElementById('qtdFisica').value);
  const btn = document.getElementById('btnConf');
  const msg = document.getElementById('msgConf');
  if (!qtdFis && qtdFis !== 0) { showMsg(msg,'Informe a quantidade física.','error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Salvando...';

  const qtdNF = parseInt(document.getElementById('qtdNF').value)||0;
  const { error } = await sb.from('registros_cq').update({
    qtd_recebida: qtdFis,
    divergencia_quantidade: qtdFis - qtdNF,
    conferente: document.getElementById('conferente').value,
    data_conferencia: new Date().toISOString()
  }).eq('id', loteSelecionadoId);

  if (error) { showMsg(msg,'Erro: '+error.message,'error'); }
  else {
    showMsg(msg,'✓ Conferência registrada!','success');
    setTimeout(()=>{ limparSelecao(); buscarLotes(); },1500);
  }
  btn.disabled=false; btn.textContent='Salvar Conferência';
}

function showMsg(el,txt,tipo){ el.textContent=txt; el.className='msg '+tipo; }
</script>
</body>
</html>
