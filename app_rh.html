<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic RH & SST - Painel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a;
    --accent: #c8a96e; --accent2: #e8c98e; --text: #f0ede8; --muted: #888;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }
  .bg-pattern {
    position:fixed; inset:0; z-index:0;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 60px,rgba(200,169,110,0.03) 60px,rgba(200,169,110,0.03) 61px),
      repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(200,169,110,0.03) 60px,rgba(200,169,110,0.03) 61px);
  }
  header {
    position:sticky; top:0; z-index:100;
    background:var(--surface); border-bottom:1px solid var(--border);
    padding:16px 32px; display:flex; align-items:center; justify-content:space-between;
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:36px; height:36px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:2px; display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .logo-text { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; letter-spacing:0.05em; }
  .logo-text span { color:var(--accent); }
  .header-right { display:flex; align-items:center; gap:16px; }
  #headerUser { font-size:12px; color:var(--muted); }
  .btn-sair {
    background:transparent; border:1px solid var(--border); border-radius:2px;
    color:var(--muted); font-size:11px; padding:6px 14px; cursor:pointer;
    letter-spacing:0.1em; text-transform:uppercase; transition:all 0.2s;
  }
  .btn-sair:hover { border-color:var(--accent); color:var(--accent); }
  .btn-cq {
    background:transparent; border:1px solid var(--border); border-radius:2px;
    color:var(--muted); font-size:11px; padding:6px 14px; cursor:pointer;
    letter-spacing:0.1em; text-transform:uppercase; transition:all 0.2s;
    text-decoration:none;
  }
  .btn-cq:hover { border-color:var(--accent); color:var(--accent); }

  main { position:relative; z-index:1; max-width:1100px; margin:0 auto; padding:48px 24px; }
  .welcome { margin-bottom:48px; padding-bottom:32px; border-bottom:1px solid var(--border); }
  .welcome-tag { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
  .welcome-title { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; line-height:1.1; }
  .welcome-title span { color:var(--accent); }
  .welcome-sub { font-size:14px; color:var(--muted); margin-top:8px; }

  .section-block { margin-bottom:48px; }
  .section-title {
    font-family:'Syne',sans-serif;
    font-size:11px; font-weight:700;
    letter-spacing:0.22em; text-transform:uppercase;
    color:var(--accent);
    margin-bottom:16px;
    padding-bottom:10px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px;
  }
  .section-title::before {
    content:''; width:3px; height:14px;
    background:var(--accent); border-radius:1px; display:inline-block;
  }

  .grid-ops { display:grid; grid-template-columns:repeat(2, 1fr); gap:16px; }
  .card-ops {
    background:var(--surface);
    border:1px solid var(--border);
    border-left:3px solid var(--accent);
    border-radius:2px;
    padding:32px 28px; min-height:160px;
    cursor:pointer; text-decoration:none; color:var(--text);
    display:block;
    transition:border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    animation:fadeIn 0.4s ease both;
  }
  .card-ops:hover {
    border-color:var(--accent); transform:translateY(-2px);
    box-shadow:0 4px 20px rgba(200,169,110,0.08);
  }
  .card-ops .card-icon { font-size:32px; margin-bottom:14px; }
  .card-ops .card-title { font-family:'Syne',sans-serif; font-size:16px; font-weight:700; letter-spacing:0.05em; margin-bottom:8px; }
  .card-ops .card-desc { font-size:13px; color:var(--muted); line-height:1.6; }
  .card-badge {
    display:inline-block; margin-top:14px;
    font-size:10px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--accent); border:1px solid rgba(200,169,110,0.3); border-radius:2px; padding:3px 8px;
  }

  .grid-3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:16px; }
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:2px;
    padding:28px; cursor:pointer; text-decoration:none; color:var(--text);
    display:block; transition:border-color 0.2s,transform 0.15s;
    animation:fadeIn 0.4s ease both;
  }
  .card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .card-icon { font-size:28px; margin-bottom:16px; }
  .card-title { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.05em; margin-bottom:6px; }
  .card-desc { font-size:12px; color:var(--muted); line-height:1.5; }

  @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
  .card-ops:nth-child(1){animation-delay:0.05s}
  .card-ops:nth-child(2){animation-delay:0.10s}
  .card-ops:nth-child(3){animation-delay:0.15s}
  .card-ops:nth-child(4){animation-delay:0.20s}
  .card-ops:nth-child(5){animation-delay:0.25s}

  .hidden { display:none !important; }

  /* KPI Strip */
  .kpi-strip {
    position:relative; z-index:1;
    display:flex; gap:0; justify-content:center;
    background:var(--surface); border-bottom:2px solid var(--accent);
    padding:0;
  }
  .kpi-box {
    flex:1; max-width:280px; padding:14px 24px;
    text-align:center; border-right:1px solid var(--border);
  }
  .kpi-box:last-child { border-right:none; }
  .kpi-box.clickable { cursor:pointer; transition: background 0.2s; }
  .kpi-box.clickable:hover { background: rgba(200,169,110,0.08); }
  .kpi-value {
    font-family:'Syne',sans-serif; font-size:28px; font-weight:800;
    color:var(--accent); line-height:1;
  }
  .kpi-label {
    font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
    color:var(--muted); margin-top:4px;
  }

  @media (max-width:768px) {
    .grid-ops { grid-template-columns:1fr; }
    .grid-3   { grid-template-columns:1fr; }
    .kpi-strip { flex-direction:column; }
    .kpi-box { border-right:none; border-bottom:1px solid var(--border); }
    .kpi-box:last-child { border-bottom:none; }
    header { padding:12px 16px; }
    main { padding:32px 16px; }
  }
  @media (min-width:769px) and (max-width:1024px) {
    .grid-3 { grid-template-columns:repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="bg-pattern"></div>

<header>
  <div class="logo">
    <img id="logoImg" src="assets/logo-classic-icon.png.jpg" alt="" style="width:36px;height:36px;object-fit:contain;border-radius:2px;" onerror="this.style.display='none'">
    <div class="logo-text">CLASSIC <span>RH</span></div>
  </div>
  <div class="header-right">
    <span id="headerUser"></span>
    <a href="app.html" class="btn-cq">CQ</a>
    <button class="btn-sair" onclick="RHAuth.logout()">Sair</button>
  </div>
</header>

<!-- KPI Strip -->
<div class="kpi-strip">
  <div class="kpi-box clickable" onclick="window.location.href='gestao_rh_sst.html'" title="Ver colaboradores">
    <div class="kpi-value" id="kpiAtivos">&mdash;</div>
    <div class="kpi-label">Colaboradores ativos</div>
  </div>
  <div class="kpi-box clickable" onclick="window.location.href='gestao_rh_sst.html?tab=aso'" title="Ver ASOs">
    <div class="kpi-value" id="kpiAsoVencer">&mdash;</div>
    <div class="kpi-label">ASOs a vencer (30d)</div>
  </div>
  <div class="kpi-box clickable" onclick="window.location.href='recrutamento_selecao.html'" title="Ver vagas">
    <div class="kpi-value" id="kpiVagas">&mdash;</div>
    <div class="kpi-label">Vagas abertas</div>
  </div>
  <div class="kpi-box clickable" onclick="window.location.href='gestao_pagamentos.html'" title="Ver apuracao">
    <div class="kpi-value" id="kpiApuracao">&mdash;</div>
    <div class="kpi-label">Apuracao mensal</div>
  </div>
</div>

<main>
  <div class="welcome">
    <div class="welcome-tag">Classic Importacao e Exportacao de Couros</div>
    <div class="welcome-title">RH & <span>Seguranca do Trabalho</span></div>
    <div class="welcome-sub" id="welcomeSub">Carregando...</div>
  </div>

  <div id="sectionsContainer"></div>
</main>

<script src="config_rh.js"></script>
<script src="rh_api.js"></script>
<script src="rh_auth.js"></script>
<script>

const SECTIONS = [
  {
    id: 'rh_sst',
    titulo: 'RH & Seguranca do Trabalho',
    gridClass: 'grid-ops',
    cardClass: 'card-ops',
    modulos: [
      {
        id:'gestao_rh_sst', titulo:'Gestao RH & SST', icon:'assets/ico-rh.png',
        iconFallback:'\uD83D\uDC65',
        href:'gestao_rh_sst.html',
        desc:'Funcionarios, ASO, treinamentos NR, EPIs, acidentes, absenteismo, restricoes e desligamentos. Motor logico integrado.',
        badge:'RH & SST',
        perfis:['administrador','rh','diretoria','sst']
      },
      {
        id:'dashboard_sst', titulo:'Dashboard SST', icon:'assets/ico-dashboard-sst.png',
        iconFallback:'\uD83D\uDCCA',
        href:'dashboard_sst.html',
        desc:'KPIs de conformidade, turnover, risco por setor, funcionarios bloqueados, analise cruzada de desligamentos.',
        badge:'Dashboard',
        perfis:['administrador','rh','diretoria','sst']
      },
      {
        id:'saude_equilibrio', titulo:'Saude e Equilibrio', icon:'assets/ico-saude.png',
        iconFallback:'\uD83D\uDCAC',
        href:'saude_equilibrio.html',
        desc:'Programa de saude mental: atendimentos, classificacao de risco psicossocial, gatilhos automaticos e NR-1.',
        badge:'NR-1',
        perfis:['administrador','rh','diretoria','sst']
      },
      {
        id:'gestao_pagamentos', titulo:'Gestao de Pagamentos', icon:'assets/ico-pagamentos.png',
        iconFallback:'\uD83D\uDCB0',
        href:'gestao_pagamentos.html',
        desc:'Dados bancarios, lotes de pagamento, exportacao para financeiro (Itau, Sicredi, PIX, Cheque).',
        badge:'Financeiro',
        perfis:['administrador','rh','diretoria','financeiro']
      },
      {
        id:'recrutamento_selecao', titulo:'Recrutamento & Selecao', icon:'assets/ico-recrutamento.png',
        iconFallback:'\uD83C\uDFAF',
        href:'recrutamento_selecao.html',
        desc:'Vagas, candidatos, pipeline kanban, agenda de entrevistas, ficha de avaliacao e banco de talentos.',
        badge:'R&S',
        perfis:['administrador','rh','diretoria']
      }
    ]
  }
];

// Logo
(function(){
  const s = localStorage.getItem('classic_logo');
  const el = document.getElementById('logoImg');
  if (el && s) el.src = s;
})();

// KPIs
async function carregarKPIs() {
  // 1. Colaboradores ativos
  try {
    const rows = await RH_API.get('rh_colaboradores?status=eq.ativo&select=id');
    document.getElementById('kpiAtivos').textContent = (rows || []).length;
  } catch(e) { console.warn('KPI ativos:', e); }

  // 2. ASOs a vencer em 30 dias
  try {
    const d30 = new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10);
    const hoje = new Date().toISOString().slice(0, 10);
    const rows = await RH_API.get(`rh_aso?data_validade=gte.${hoje}&data_validade=lte.${d30}&select=id`);
    document.getElementById('kpiAsoVencer').textContent = (rows || []).length;
  } catch(e) { console.warn('KPI ASO:', e); }

  // 3. Vagas abertas
  try {
    const rows = await RH_API.get('rs_vagas?status=eq.aberta&select=id');
    document.getElementById('kpiVagas').textContent = (rows || []).length;
  } catch(e) { console.warn('KPI vagas:', e); }

  // 4. Status apuracao mensal
  try {
    const now = new Date();
    const comp = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    const rows = await RH_API.get(`rh_apuracao_mensal?competencia=eq.${comp}&select=id,status`);
    if (rows && rows.length > 0) {
      const pendentes = rows.filter(r => r.status !== 'validado').length;
      document.getElementById('kpiApuracao').textContent = pendentes > 0 ? pendentes + ' pend.' : 'OK';
    } else {
      document.getElementById('kpiApuracao').textContent = 'N/A';
    }
  } catch(e) { console.warn('KPI apuracao:', e); }
}

// Render
function renderSections(perfilUsuario) {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';

  SECTIONS.forEach(section => {
    const visiveis = section.modulos.filter(m => m.perfis.includes(perfilUsuario));
    if (visiveis.length === 0) return;

    const block = document.createElement('div');
    block.className = 'section-block';

    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = section.titulo;
    block.appendChild(title);

    const grid = document.createElement('div');
    grid.className = section.gridClass;

    visiveis.forEach((m, i) => {
      const a = document.createElement('a');
      a.className = section.cardClass;
      a.href = m.href;
      a.style.animationDelay = (i * 0.05 + 0.05) + 's';

      // Try loading image icon, fallback to emoji
      const iconHtml = m.icon
        ? `<img src="${m.icon}" alt="" style="width:32px;height:32px;object-fit:contain;" onerror="this.outerHTML='<span style=font-size:32px>${m.iconFallback || ''}</span>'">`
        : `<span style="font-size:32px">${m.iconFallback || ''}</span>`;

      a.innerHTML = `
        <div class="card-icon">${iconHtml}</div>
        <div class="card-title">${m.titulo}</div>
        <div class="card-desc">${m.desc}</div>
        <div class="card-badge">${m.badge}</div>`;
      grid.appendChild(a);
    });

    block.appendChild(grid);
    container.appendChild(block);
  });
}

function traduzPerfil(p) {
  const t = {administrador:'Administrador',rh:'Recursos Humanos',sst:'SST',diretoria:'Diretoria',financeiro:'Financeiro'};
  return t[p] || p;
}

// Init
(async () => {
  const perfil = await RHAuth.init();
  if (!perfil) return;

  document.getElementById('headerUser').textContent =
    (perfil.nome || perfil.email) + ' \u00b7 ' + traduzPerfil(perfil.perfil);
  document.getElementById('welcomeSub').textContent =
    'Bem-vindo, ' + (perfil.nome || perfil.email) + '. Selecione um modulo abaixo.';

  renderSections(perfil.perfil);
  carregarKPIs();
})();
</script>
</body>
</html>
