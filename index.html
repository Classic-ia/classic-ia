<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classic CQ — Menu Principal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');
  :root {
    --bg:#0a0d14;--surface:#111520;--surface2:#161c2c;--border:#252d42;
    --accent:#e8a020;--green:#2dce6e;--red:#e03535;--blue:#3a7bd5;
    --purple:#9b59b6;--text:#dde2ef;--text2:#6b7a99;
    --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:var(--mono);font-size:13px;color:var(--accent);letter-spacing:0.1em;}
  .logo span{color:var(--text2);}
  .header-right{display:flex;align-items:center;gap:12px;}
  .user-info{font-family:var(--mono);font-size:11px;color:var(--text2);text-align:right;}
  .user-nome{color:var(--text);font-weight:600;display:block;}
  .perfil-badge{font-size:10px;padding:2px 7px;border-radius:3px;}
  .btn-logout{background:none;border:1px solid rgba(224,53,53,0.3);color:var(--red);font-family:var(--mono);font-size:11px;padding:5px 12px;border-radius:3px;cursor:pointer;transition:all 0.15s;}
  .btn-logout:hover{border-color:var(--red);}
  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
  .logo-area{text-align:center;margin-bottom:40px;}
  .logo-sub{font-family:var(--mono);font-size:10px;color:var(--text2);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:8px;}
  .logo-title{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--accent);}
  .logo-title span{color:var(--text2);font-weight:400;}
  .logo-desc{font-size:12px;color:var(--text2);margin-top:6px;}
  .divider{width:40px;height:1px;background:var(--border);margin:16px auto;}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%;max-width:860px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:24px 20px;text-decoration:none;color:var(--text);display:flex;flex-direction:column;gap:10px;transition:border-color 0.2s,transform 0.15s,background 0.2s;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:8px 8px 0 0;}
  .card.orange::before{background:var(--accent);}
  .card.blue::before{background:var(--blue);}
  .card.green::before{background:var(--green);}
  .card.purple::before{background:var(--purple);}
  .card.red::before{background:var(--red);}
  .card:hover{transform:translateY(-3px);background:var(--surface2);}
  .card.orange:hover{border-color:var(--accent);}
  .card.blue:hover{border-color:var(--blue);}
  .card.green:hover{border-color:var(--green);}
  .card.purple:hover{border-color:var(--purple);}
  .card.red:hover{border-color:var(--red);}
  .card.locked{opacity:0.4;pointer-events:none;}
  .card-icon{font-size:26px;line-height:1;}
  .card-label{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.15em;color:var(--text2);}
  .card-title{font-size:15px;font-weight:600;line-height:1.2;}
  .card-desc{font-size:12px;color:var(--text2);line-height:1.6;flex:1;}
  .card-arrow{font-family:var(--mono);font-size:11px;color:var(--text2);margin-top:2px;}
  footer{padding:16px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--text2);border-top:1px solid var(--border);}
  @media(max-width:700px){.cards{grid-template-columns:1fr 1fr;}}
  @media(max-width:480px){.cards{grid-template-columns:1fr;max-width:400px;}}
</style>
</head>
<body>

<header>
  <div class="logo">Classic <span>//</span> CQ</div>
  <div class="header-right">
    <div class="user-info">
      <span class="user-nome" id="user-nome">—</span>
      <span class="perfil-badge" id="perfil-badge">—</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
</header>

<main>
  <div class="logo-area">
    <div class="logo-sub">Classic Importação e Exportação</div>
    <div class="logo-title">SISTEMA <span>//</span> CQ</div>
    <div class="logo-desc">Controle de Qualidade — Miúdos Bovinos</div>
    <div class="divider"></div>
  </div>

  <div class="cards" id="cards-container">
    <!-- cards gerados por JS conforme perfil -->
  </div>
</main>

<footer>CLASSIC IMPORTAÇÃO E EXPORTAÇÃO DE COUROS LTDA</footer>

<script>
function getSessao() {
  try {
    const s = JSON.parse(localStorage.getItem('cq_sessao'));
    if (!s) return null;
    if ((new Date() - new Date(s.salvoEm)) > 8*3600000) { localStorage.removeItem('cq_sessao'); return null; }
    return s;
  } catch { return null; }
}
function logout() { localStorage.removeItem('cq_sessao'); window.location.href = 'login.html'; }

const sessao = getSessao();
if (!sessao) { window.location.href = 'login.html'; }

const u = sessao.usuario;
document.getElementById('user-nome').textContent = u.nome;

const PERFIL_LABELS = { gestor:'Gestor', analisador:'Analisador', conferente:'Conferente', financeiro:'Financeiro', qualidade_externo:'Qualidade Externo' };
const PERFIL_CORES = { gestor:'#e8a020', analisador:'#3a7bd5', conferente:'#2dce6e', financeiro:'#9b59b6', qualidade_externo:'#6b7a99' };

const badge = document.getElementById('perfil-badge');
badge.textContent = PERFIL_LABELS[u.perfil] || u.perfil;
badge.style.background = (PERFIL_CORES[u.perfil]||'#333') + '22';
badge.style.color = PERFIL_CORES[u.perfil] || '#999';
badge.style.border = '1px solid ' + (PERFIL_CORES[u.perfil]||'#333') + '55';

const TODOS_CARDS = [
  { id:'formulario', href:'formulario_cq.html', cor:'orange', icon:'📋', label:'Chão de fábrica', title:'Lançamento de CQ', desc:'Digitação das fichas de análise. Calcula percentuais e classifica o lote automaticamente.', perfis:['analisador','gestor'] },
  { id:'conferencia', href:'conferencia_quantidade.html', cor:'blue', icon:'📦', label:'Recebimento', title:'Conferência de Quantidade', desc:'Registra a quantidade física recebida. Detecta divergências com a NF do fornecedor.', perfis:['conferente','gestor'] },
  { id:'dashboard', href:'dashboard_cq.html', cor:'blue', icon:'📊', label:'Gestão', title:'Dashboard de Análise', desc:'Visão geral em tempo real. Ranking de fornecedores, alertas Classe C e evolução mensal.', perfis:['gestor','qualidade_externo','financeiro','analisador','conferente'] },
  { id:'calculadora', href:'calculadora_financeira.html', cor:'green', icon:'💰', label:'Financeiro', title:'Calculadora de Desconto', desc:'Calcula o desconto sugerido por lote com base nos dados do CQ. Registra decisões.', perfis:['financeiro','gestor'] },
  { id:'usuarios', href:'usuarios.html', cor:'purple', icon:'👥', label:'Administração', title:'Gestão de Usuários', desc:'Cadastrar, editar e controlar acesso de todos os usuários do sistema.', perfis:['gestor'] },
];

const container = document.getElementById('cards-container');
const cardsVisiveis = TODOS_CARDS.filter(c => c.perfis.includes(u.perfil));
container.innerHTML = cardsVisiveis.map(c => `
  <a class="card ${c.cor}" href="${c.href}">
    <div class="card-icon">${c.icon}</div>
    <div class="card-label">${c.label}</div>
    <div class="card-title">${c.title}</div>
    <div class="card-desc">${c.desc}</div>
    <div class="card-arrow">Acessar →</div>
  </a>
`).join('');

// Ajusta grid conforme qtd de cards
const n = cardsVisiveis.length;
if (n <= 2) container.style.gridTemplateColumns = 'repeat(2,1fr)';
else if (n >= 5) container.style.gridTemplateColumns = 'repeat(3,1fr)';
</script>
</body>
</html>
