<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login · Classic CQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<script src="cq_auth.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: #07111c;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif;
  padding: 20px;
}

/* grade de fundo */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(46,107,138,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(46,107,138,.06) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.card {
  background: #0d1b2a;
  border: 1px solid #1e3a52;
  border-radius: 16px;
  padding: 40px 36px;
  width: 100%;
  max-width: 380px;
  position: relative;
  box-shadow: 0 24px 64px rgba(0,0,0,.5);
}

/* borda dourada top */
.card::before {
  content: '';
  position: absolute;
  top: 0; left: 24px; right: 24px;
  height: 2px;
  background: linear-gradient(90deg, transparent, #c8a96e, transparent);
  border-radius: 2px;
}

.logo-wrap {
  text-align: center;
  margin-bottom: 28px;
}
.logo-img {
  width: 64px; height: 64px;
  object-fit: contain;
  border-radius: 12px;
  margin-bottom: 12px;
}
.logo-title {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 22px;
  color: #c8a96e;
  letter-spacing: .02em;
}
.logo-sub {
  font-size: 12px;
  color: #5d7f95;
  margin-top: 3px;
}

.field {
  margin-bottom: 16px;
}
label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: #5d7f95;
  text-transform: uppercase;
  letter-spacing: .07em;
  margin-bottom: 7px;
}
input {
  width: 100%;
  background: #162535;
  border: 1.5px solid #1e3a52;
  border-radius: 10px;
  color: #e8f0f5;
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  font-family: 'DM Sans', sans-serif;
  transition: border-color .2s, box-shadow .2s;
}
input:focus {
  border-color: #2E6B8A;
  box-shadow: 0 0 0 3px rgba(46,107,138,.15);
}
input.error {
  border-color: #e74c3c;
}

.btn-login {
  width: 100%;
  padding: 13px;
  background: #2E6B8A;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Syne', sans-serif;
  letter-spacing: .03em;
  transition: background .2s, transform .1s;
  margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-login:hover  { background: #3d8aad; }
.btn-login:active { transform: scale(.98); }
.btn-login:disabled { opacity: .5; cursor: not-allowed; }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  background: rgba(231,76,60,.1);
  border: 1px solid rgba(231,76,60,.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #e74c3c;
  margin-top: 14px;
  display: none;
  align-items: center;
  gap: 8px;
}

.version {
  text-align: center;
  font-size: 10px;
  color: #1e3a52;
  margin-top: 28px;
  font-family: 'DM Mono', monospace;
}

/* aviso de sessão expirada (vindo de redirect) */
.expired-banner {
  background: rgba(243,156,18,.1);
  border: 1px solid rgba(243,156,18,.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #f39c12;
  margin-bottom: 18px;
  display: none;
  align-items: center;
  gap: 8px;
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img class="logo-img" id="logoImg" src="" alt="Classic Couros"
      onerror="this.style.display='none'">
    <div class="logo-title">Classic CQ</div>
    <div class="logo-sub">Controle de Qualidade · Acesso Restrito</div>
  </div>

  <div class="expired-banner" id="expiredBanner">
    ⏰ Sessão expirada por inatividade. Faça login novamente.
  </div>

  <div class="field">
    <label for="inp-email">E-mail</label>
    <input type="email" id="inp-email" placeholder="usuario@classic.com.br"
      autocomplete="email" onkeydown="if(event.key==='Enter') document.getElementById('inp-senha').focus()">
  </div>

  <div class="field">
    <label for="inp-senha">Senha</label>
    <input type="password" id="inp-senha" placeholder="••••••••"
      autocomplete="current-password"
      onkeydown="if(event.key==='Enter') fazerLogin()">
  </div>

  <button class="btn-login" id="btnLogin" onclick="fazerLogin()">
    <div class="spinner" id="spinner"></div>
    <span id="btnTxt">Entrar</span>
  </button>

  <div class="error-msg" id="errMsg">
    <span>⚠️</span><span id="errTxt"></span>
  </div>

  <div id="demoDiv" style="text-align:center;margin-top:16px;">
  <button onclick="entrarModoDemo()" style="
    background:none;border:none;color:#1e3a52;cursor:pointer;
    font-size:11px;font-family:'DM Mono',monospace;
    text-decoration:underline;padding:4px;
  ">⚙️ Modo demonstração (sem servidor)</button>
</div>
<div class="version">Classic CQ · v2025 · Jardim Alegre/PR</div>
</div>

<script>
// Logo
(function(){
  const s = localStorage.getItem('classic_logo');
  const el = document.getElementById('logoImg');
  if (s) el.src = s; else el.style.display = 'none';

  // Se já tem sessão no localStorage → ir para o sistema
  // (o app.html vai validar a sessão e redirecionar de volta se inválida)
  try {
    const raw = localStorage.getItem('cq_sess_v2');
    if (raw) {
      const sess = JSON.parse(raw);
      if (sess.token && sess.user && sess.ts) {
        // Verificar se não expirou pelo timestamp local (1h)
        const umHora = 60 * 60 * 1000;
        const idade  = Date.now() - (sess.ts || 0);
        if (idade < umHora) {
          window.location.href = 'app.html';
          return; // parar execução
        } else {
          // Expirou localmente — limpar
          localStorage.removeItem('cq_sess_v2');
        }
      } else {
        localStorage.removeItem('cq_sess_v2');
      }
    }
  } catch {
    localStorage.removeItem('cq_sess_v2');
  }

  // Verificar se veio de sessão expirada
  const params = new URLSearchParams(window.location.search);
  if (params.get('exp') === '1') {
    document.getElementById('expiredBanner').style.display = 'flex';
  }
})();

async function fazerLogin() {
  const email = document.getElementById('inp-email').value.trim();
  const senha = document.getElementById('inp-senha').value;
  const btn   = document.getElementById('btnLogin');
  const err   = document.getElementById('errMsg');
  const spin  = document.getElementById('spinner');
  const txt   = document.getElementById('btnTxt');

  // Limpar erro
  err.style.display = 'none';
  document.getElementById('inp-email').classList.remove('error');
  document.getElementById('inp-senha').classList.remove('error');

  // Validar
  if (!email) {
    document.getElementById('inp-email').classList.add('error');
    mostrarErro('Informe o e-mail'); return;
  }
  if (!senha) {
    document.getElementById('inp-senha').classList.add('error');
    mostrarErro('Informe a senha'); return;
  }

  // Loading
  btn.disabled = true;
  spin.style.display = 'block';
  txt.textContent = 'Entrando...';

  try {
    const user = await CQAuth.login(email, senha);
    // Redirecionar para página de origem ou index
    const params = new URLSearchParams(window.location.search);
    const dest = params.get('next') || 'app.html';
    window.location.href = dest;
  } catch (e) {
    mostrarErro(e.message || 'Erro ao conectar. Tente novamente.');
    btn.disabled = false;
    spin.style.display = 'none';
    txt.textContent = 'Entrar';
  }
}

function entrarModoDemo() {
  // Cria sessão local sem validação do servidor
  const sessaoDemo = {
    token: 'demo-' + Date.now(),
    user: {
      id:     'demo-user-001',
      email:  'demo@classic.com.br',
      nome:   'Usuário Demo',
      perfil: 'administrador',
    },
    ts: Date.now(),
  };
  localStorage.setItem('cq_sess_v2', JSON.stringify(sessaoDemo));
  window.location.href = 'app.html';
}

function mostrarErro(msg) {
  const err = document.getElementById('errMsg');
  document.getElementById('errTxt').textContent = msg;
  err.style.display = 'flex';
}
</script>
</body>
</html>
