<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerar Hash</title>
<style>
  body { background: #0a0d14; color: #dde2ef; font-family: monospace; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .box { background: #111520; border: 1px solid #252d42; border-radius: 8px; padding: 28px; width: 100%; max-width: 480px; }
  h2 { color: #e8a020; margin-bottom: 20px; font-size: 16px; }
  label { display: block; font-size: 11px; color: #6b7a99; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
  input { width: 100%; background: #161c2c; border: 1px solid #252d42; color: #dde2ef; font-family: monospace; font-size: 15px; padding: 11px 13px; border-radius: 4px; outline: none; margin-bottom: 14px; }
  input:focus { border-color: #e8a020; }
  button { width: 100%; background: #e8a020; color: #000; border: none; font-family: monospace; font-size: 13px; font-weight: 700; padding: 13px; border-radius: 4px; cursor: pointer; margin-bottom: 16px; }
  .result { background: #0d2e1a; border: 1px solid #1a5a30; border-radius: 4px; padding: 14px; display: none; }
  .result p { font-size: 11px; color: #6b7a99; margin-bottom: 8px; }
  .hash { font-size: 12px; color: #2dce6e; word-break: break-all; line-height: 1.6; }
  .sql-box { background: #161c2c; border: 1px solid #252d42; border-radius: 4px; padding: 14px; margin-top: 14px; font-size: 11px; color: #8892a4; line-height: 1.8; }
  .sql-box strong { color: #e8a020; }
  .btn-copy { width: 100%; background: #161c2c; border: 1px solid #252d42; color: #6b7a99; font-family: monospace; font-size: 12px; padding: 9px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
  .btn-copy:hover { border-color: #e8a020; color: #e8a020; }
</style>
</head>
<body>
<div class="box">
  <h2>🔑 Gerador de Hash — Classic CQ</h2>
  <label>E-mail do usuário</label>
  <input type="email" id="email" value="gestor@classic.com.br">
  <label>Senha desejada</label>
  <input type="text" id="senha" placeholder="Digite a senha">
  <button onclick="gerar()">GERAR HASH E SQL</button>

  <div class="result" id="result">
    <p>Hash SHA-256 gerado:</p>
    <div class="hash" id="hash-valor"></div>
    <div class="sql-box" id="sql-texto"></div>
    <button class="btn-copy" onclick="copiar()">📋 COPIAR SQL</button>
    <p style="margin-top:12px;color:#e8a020;font-size:11px;">▶ Cole esse SQL no Supabase → SQL Editor → Run</p>
  </div>
</div>

<script>
async function gerar() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  if (!email || !senha) { alert('Preencha e-mail e senha'); return; }

  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(senha));
  const hash = Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');

  document.getElementById('hash-valor').textContent = hash;

  const sql = `DELETE FROM usuarios WHERE email = '${email}';\n\nINSERT INTO usuarios (nome, email, senha_hash, perfil, ativo)\nVALUES ('Gestor', '${email}', '${hash}', 'gestor', true);`;
  document.getElementById('sql-texto').innerHTML = '<strong>SQL para rodar no Supabase:</strong><br><br>' + sql.replace(/\n/g, '<br>');
  document.getElementById('result').style.display = 'block';

  window._sqlGerado = sql;
}

function copiar() {
  navigator.clipboard.writeText(window._sqlGerado || '').then(() => {
    document.querySelector('.btn-copy').textContent = '✓ COPIADO!';
    setTimeout(() => document.querySelector('.btn-copy').textContent = '📋 COPIAR SQL', 2000);
  });
}
</script>
</body>
</html>
